<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>About — The Corporate English Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy:#20395c;
    --navy-deep:#152840;
    --navy-soft:#54688a;
    --sage:#5d7c69;
    --sage-deep:#465c4f;
    --sage-tint:#dce7dd;
    --bg:#f1f3ef;
    --bg-2:#eaeee8;
    --surface:#ffffff;
    --surface-soft:#f8faf6;
    --line:#e0e4dd;
    --line-strong:#cdd4c9;
    --ink:#1e2a3a;
    --muted:#6c7787;
    --serif:"Playfair Display", Georgia, serif;
    --sans:"Hanken Grotesk", system-ui, sans-serif;
    --shadow-sm:0 1px 2px rgba(21,40,64,.05), 0 1px 3px rgba(21,40,64,.06);
    --shadow-md:0 6px 16px rgba(21,40,64,.08), 0 2px 6px rgba(21,40,64,.05);
    --shadow-lg:0 22px 50px -12px rgba(21,40,64,.22), 0 8px 20px rgba(21,40,64,.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh;}
  #root{min-height:100vh;}
  ::selection{background:var(--sage-tint);color:var(--navy-deep);}
  button{font-family:inherit;cursor:pointer;}

  /* Layout */
  .page{position:relative;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}

  /* Nav */
  .nav{position:relative;z-index:5;display:flex;align-items:center;justify-content:space-between;
    padding:22px 40px;max-width:1320px;margin:0 auto;width:100%;}
  .nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--navy);}
  .nav-logo img{height:60px;width:auto;display:block;}
  .nav-right{display:flex;align-items:center;gap:10px;}
  .lang-toggle{display:flex;align-items:center;gap:7px;border:1px solid var(--line-strong);
    background:var(--surface);border-radius:999px;padding:7px 13px;font-size:14px;font-weight:600;
    color:var(--navy);box-shadow:var(--shadow-sm);}
  .nav-link{padding:9px 14px;border-radius:10px;color:var(--navy);text-decoration:none;
    font-weight:600;font-size:15px;background:transparent;border:none;transition:background .15s;}
  .nav-link:hover{background:rgba(32,57,92,.07);}
  .nav-link.active{background:rgba(32,57,92,.09);}
  .btn-login{background:var(--navy);color:#fff;border:none;border-radius:11px;padding:11px 22px;
    font-weight:700;font-size:15px;white-space:nowrap;box-shadow:var(--shadow-sm);
    transition:transform .12s,background .2s;}
  .btn-login:hover{background:var(--navy-deep);transform:translateY(-1px);}
  .seg{border:none;background:transparent;border-radius:999px;padding:4px 11px;
    font-weight:700;font-size:13px;transition:all .15s;cursor:pointer;}

  /* Story sections */
  .section{position:relative;z-index:2;}
  .section.alt{background:var(--bg-2);border-top:1px solid var(--line);}
  .content-wrap{position:relative;max-width:1080px;margin:0 auto;padding-left:60px;padding-right:40px;}
  .sec-wrap{position:relative;width:100%;padding:0;}
  .ethos{padding:104px 0 88px;border-top:1px solid var(--line);}
  .founder{min-height:84vh;display:flex;flex-direction:column;justify-content:center;padding:72px 0;}
  .sec-title{font-family:var(--serif);font-weight:600;color:var(--navy);letter-spacing:-.01em;
    font-size:clamp(40px,6vw,72px);line-height:1;margin:0 0 30px;}
  .sec-rule{width:64px;height:3px;background:var(--sage);border-radius:2px;margin:0 0 30px;}
  .prose{max-width:760px;}
  .prose p{font-size:clamp(17px,1.6vw,20px);line-height:1.72;color:var(--navy-soft);
    margin:0 0 22px;text-wrap:pretty;}
  .prose p:last-child{margin-bottom:0;}
  .watermark{position:absolute;pointer-events:none;opacity:.09;width:300px;height:auto;}

  /* Founder */
  .founder-grid{display:flex;flex-direction:column;gap:28px;max-width:680px;align-items:stretch;}
  .video-ph{position:relative;aspect-ratio:16/9;border-radius:20px;overflow:hidden;
    border:1px solid var(--line-strong);box-shadow:var(--shadow-lg);display:flex;
    flex-direction:column;align-items:center;justify-content:center;gap:16px;cursor:pointer;
    background:repeating-linear-gradient(135deg,#e3ede4,#e3ede4 13px,#edf3ed 13px,#edf3ed 26px);
    transition:transform .2s,box-shadow .2s;}
  .video-ph:hover{transform:translateY(-2px);
    box-shadow:var(--shadow-lg),0 0 0 4px rgba(93,124,105,.14);}
  .play{width:78px;height:78px;border-radius:50%;background:rgba(255,255,255,.94);display:flex;
    align-items:center;justify-content:center;color:var(--navy);box-shadow:var(--shadow-md);
    transition:transform .2s;}
  .video-ph:hover .play{transform:scale(1.06);}
  .play svg{margin-left:4px;}
  .video-col{display:flex;flex-direction:column;}
  .video-cap{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:12px;
    letter-spacing:.06em;color:var(--sage-deep);margin-top:13px;text-transform:uppercase;}
  .founder-bio .kicker{font-size:13px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--sage-deep);font-weight:700;margin:0 0 14px;}

  /* Footer */
  .foot-cep{text-align:center;color:var(--muted);font-size:14px;padding:38px 0 18px;
    letter-spacing:.01em;}

  /* Clickable word definitions */
  @keyframes defPop{
    from{opacity:0;transform:translateX(-50%) translateY(5px);}
    to{opacity:1;transform:translateX(-50%) translateY(0);}}
  .def-anchor{position:relative;display:inline;}
  .def-word{cursor:pointer;border-radius:3px;padding:1px 2px;margin:0 -2px;
    transition:background .15s;text-decoration-color:var(--sage);}
  .def-word:hover,.def-word.open{font-weight:700;background:rgba(93,124,105,.13);
    text-decoration:underline;text-decoration-color:var(--sage);text-underline-offset:3px;}
  .def-pop{position:absolute;bottom:calc(100% + 10px);left:50%;
    transform:translateX(-50%);background:#fff;border:1px solid var(--line-strong);
    border-radius:13px;padding:13px 16px;width:max-content;max-width:280px;
    white-space:normal;
    box-shadow:0 8px 28px rgba(21,40,64,.13),0 2px 8px rgba(21,40,64,.07);
    z-index:200;animation:defPop .15s ease both;}
  .def-pop-word{display:block;font-size:10px;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;color:var(--sage-deep);margin-bottom:6px;}
  .def-pop-text{display:block;font-size:13.5px;color:var(--muted);line-height:1.55;}
  .def-pop::after{content:"";position:absolute;bottom:-5px;left:50%;
    transform:translateX(-50%) rotate(45deg);width:9px;height:9px;
    background:#fff;border-right:1px solid var(--line-strong);
    border-bottom:1px solid var(--line-strong);}

  @media (max-width:820px){
    .nav{padding-left:20px;padding-right:20px;}
    .sec-wrap{padding:0;}
    .founder-grid{grid-template-columns:1fr;}
    .founder{min-height:0;}
    .watermark{display:none;}
    .ethos,.founder{padding-top:60px;padding-bottom:54px;}
    .nav-link.hide-sm{display:none;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const WORD_DEFS = {
  "literal":        "used here in its exact, true form — the project name really does come from this root, without exaggeration or metaphor",
  "etymological":   "relating to a word's origin and historical development — tracing 'corporate' back to its Latin source",
  "corpus":         "Latin for body — the root of 'corporate'; both the origin of the project's name and a metaphor for a living community",
  "incorporation":  "the act of making something a natural part of daily life — weaving English into everyday habits rather than treating it as a separate subject",
  "philosophy":     "the guiding beliefs and principles behind the project — its core 'why' that shapes how everything is designed and run",
  "diaspora":       "a community united by a shared language or culture, spread across many places — here, the global English-speaking world",
  "approachable":   "easy to begin and engage with, never intimidating — designed to feel natural and achievable no matter where you start",
  "holistic":       "addressing the whole person and the whole language together — reading, writing, speaking, and listening as one connected system",
  "intertwined":    "woven together so each part reinforces the others — classes, daily drills, and cross-reference are one experience, not separate tracks",
  "cross-reference":"connecting a word or concept across different subjects and contexts, so its meaning deepens with every new encounter",
  "seamless":       "flowing from one part to the next without visible breaks — all components blend into a single, unified journey",
  "communal":       "shaped by and shared within a community — language only becomes real when exchanged between people, not studied in isolation",
  "embodying":      "making an abstract skill real through lived practice — not just knowing English in theory, but using it naturally without thinking",
  "immersed":       "surrounded by all sides of the language at once — speaking, hearing, reading, and writing in real contexts, not just studying rules",
};

const _dk = Object.keys(WORD_DEFS).map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
const TEXT_RX = new RegExp(`(\\*[^*]+\\*|\\b(?:${_dk.join('|')})\\b)`, 'gi');

function WordDef({ word, def }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    if (!open) return;
    const close = e => { if (!ref.current?.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", close);
    return () => document.removeEventListener("mousedown", close);
  }, [open]);

  return (
    <span ref={ref} className="def-anchor">
      <span className={"def-word" + (open ? " open" : "")}
        role="button" tabIndex={0}
        onClick={() => setOpen(o => !o)}
        onKeyDown={e => (e.key === "Enter" || e.key === " ") && setOpen(o => !o)}>
        {word}
      </span>
      {open && (
        <span className="def-pop">
          <span className="def-pop-word">{word}</span>
          <span className="def-pop-text">{def}</span>
        </span>
      )}
    </span>
  );
}

function renderText(str) {
  if (!str) return null;
  return str.split(TEXT_RX).map((part, i) => {
    if (/^\*[^*]+\*$/.test(part)) {
      const inner = part.slice(1, -1);
      const def = WORD_DEFS[inner.toLowerCase()];
      return def ? <em key={i}><WordDef word={inner} def={def} /></em> : <em key={i}>{inner}</em>;
    }
    const def = WORD_DEFS[part.toLowerCase()];
    if (def) return <WordDef key={i} word={part} def={def} />;
    return part;
  });
}

const STR = {
  en: {
    about: "About",
    home: "Home",
    ethosTitle: "Ethos",
    ethos1: "Welcome to the Corporate English Project—or the CEP for short. Our project gets its name from the literal, etymological root, *corpus*. Based in lifestyle incorporation and community, the project's philosophy is centered on a body of people, a global community, a diaspora. Our mission is to enable English learners to join the diaspora by incorporating English into their everyday routines and habits so they can fully enjoy being a part of this global English-speaking community.",
    ethos2: "Deep language learning can be challenging, but our goal is never to make it complex. Instead, the goal of our project is to make the process approachable. The CEP approach is completely holistic and intertwined within its own parts—blending the practice of classes and tutoring, the daily habits of drills, and the deep-dive context of cross-reference all into one seamless experience.",
    ethos3: "Ultimately, language is inherently communal. Therefore, the ability to communicate with others in real time—across topics, levels, and contexts—is a vital tool for embodying this unique new skill. The CEP is built on the belief that the best learning happens when students are immersed in the full experience of the language, with all the necessary tools, and together.",
    founderTitle: "Our Founder", founderKicker: "Meet Abril",
    founderBio: "Abril is a Texas native and native English speaker with a Bachelor of Arts in Philosophy from the University of Texas at Austin. She has over 15 years of experience helping Spanish-speaking family members develop their English communication skills, has volunteered as a Spanish interpreter for pro bono legal services, and studied paralegal studies and American law at her local community college. She is currently based in EdoMéx, Mexico, where she is pursuing law school while building The Corporate English Project from the ground up.",
    founderVideoCap: "Founder intro · video coming soon",
    footer: "© 2025 The Corporate English Project · All rights reserved",
  },
  es: {
    about: "Nosotros",
    home: "Inicio",
    ethosTitle: "Ethos",
    ethos1: "The Corporate English Project es una iniciativa integral de aprendizaje del inglés con raíz en el concepto latino de corpus, o cuerpo: la idea de que el idioma es un cuerpo completo de comunicación, no una colección de habilidades aisladas. La meta es formar comunicadores completos — no solo estudiantes de gramática o practicantes de conversación, sino personas capaces de leer, escribir, hablar, escuchar y pensar en inglés con confianza.",
    ethos2: "El lenguaje es comunal por naturaleza. La verdadera fluidez no requiere solo conocimiento técnico, sino la capacidad de comunicarse con otros en tiempo real, a través de temas, niveles y contextos. El CEP se basa en la creencia de que el mejor aprendizaje ocurre cuando los estudiantes se sumergen en la experiencia completa del idioma — juntos.",
    founderTitle: "Nuestra Fundadora", founderKicker: "Conoce a Abril",
    founderBio: "Abril es originaria de Texas y hablante nativa de inglés, con una Licenciatura en Filosofía por la Universidad de Texas en Austin. Tiene más de 15 años de experiencia ayudando a familiares hispanohablantes a desarrollar sus habilidades de comunicación en inglés, ha sido voluntaria como intérprete de español para servicios legales pro bono y estudió asistencia legal y derecho estadounidense en su colegio comunitario. Actualmente vive en EdoMéx, México, donde cursa la carrera de derecho mientras construye The Corporate English Project desde cero.",
    founderVideoCap: "Presentación · video próximamente",
    footer: "© 2025 The Corporate English Project · Todos los derechos reservados",
  },
};

function Icon({ name, size = 22, stroke = 2 }) {
  const p = { width: size, height: size, viewBox: "0 0 24 24", fill: "none",
    stroke: "currentColor", strokeWidth: stroke, strokeLinecap: "round", strokeLinejoin: "round" };
  switch (name) {
    case "globe": return <svg {...p}><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18Z"/></svg>;
    case "play":  return <svg {...p} fill="currentColor" stroke="none"><path d="M8 5.5v13l11-6.5z"/></svg>;
    default: return null;
  }
}

function segStyle(active) {
  return { border: "none", background: active ? "var(--navy)" : "transparent",
    color: active ? "#fff" : "var(--navy-soft)", borderRadius: 999,
    padding: "4px 11px", fontWeight: 700, fontSize: 13, transition: "all .15s" };
}

function Nav({ t, lang, setLang }) {
  return (
    <nav className="nav">
      <a className="nav-logo" href="index.html" aria-label="Home">
        <img src="logo-navy.png" alt="The Corporate English Project" />
      </a>
      <div className="nav-right">
        <div className="lang-toggle" role="group" aria-label="Language">
          <Icon name="globe" size={17} stroke={2} />
          <button className="seg" onClick={() => setLang("en")} style={segStyle(lang === "en")}>EN</button>
          <button className="seg" onClick={() => setLang("es")} style={segStyle(lang === "es")}>ES</button>
        </div>
        <a className="nav-link hide-sm" href="index.html">{t.home}</a>
        <a className="nav-link active" href="about.html">{t.about}</a>
      </div>
    </nav>
  );
}

function AboutPage() {
  const [lang, setLang] = useState(() => {
    try { return localStorage.getItem("cep-lang") || "en"; } catch { return "en"; }
  });
  const t = STR[lang] || STR.en;

  useEffect(() => {
    try { localStorage.setItem("cep-lang", lang); } catch {}
    document.documentElement.lang = lang;
  }, [lang]);

  return (
    <div className="page">
      <Nav t={t} lang={lang} setLang={setLang} />

      <div className="content-wrap">
        <section className="section" id="ethos">
          <div className="sec-wrap ethos" style={{ padding:"104px 10px 88px" }}>
          <h2 className="sec-title" style={{ margin:"0 0 30px 10px" }}>{t.ethosTitle}</h2>
          <div className="sec-rule" style={{ margin:"0 0 30px 10px" }} />
          <div className="prose">
            {[t.ethos1, t.ethos2, t.ethos3].filter(Boolean).map((para, i, arr) => (
              <p key={i} style={{ margin: i < arr.length - 1 ? "0 0 22px 10px" : "0 0 0 10px" }}>
                {renderText(para)}
              </p>
            ))}
          </div>
        </div>
      </section>

      <section className="section alt" id="founder">
        <div className="sec-wrap founder" style={{ padding:"72px 0 72px 20px" }}>
          <img className="watermark" src="logo-navy.png" alt="" style={{ top:40, right:40 }} />
          <h2 className="sec-title" style={{ padding:"0 15px 0 10px" }}>{t.founderTitle}</h2>
          <div className="sec-rule" style={{ margin:"0 0 30px 10px" }} />
          <div className="founder-grid" style={{ padding:"0 0 0 40px" }}>
            <div className="video-col">
              <div className="video-ph" role="button" tabIndex={0} title={t.founderVideoCap}>
                <div className="play"><Icon name="play" size={30} /></div>
              </div>
              <div className="video-cap">{t.founderVideoCap}</div>
            </div>
            <div className="founder-bio">
              <p className="kicker">{t.founderKicker}</p>
              <div className="prose"><p>{t.founderBio}</p></div>
            </div>
          </div>
        </div>
      </section>

      <p className="foot-cep">{t.footer}</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AboutPage />);
</script>
</body>
</html>

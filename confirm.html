<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Confirming your account — CEP</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'DM Sans',system-ui,sans-serif;
      background:#0f1e2e;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      color:#e8f0f8;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:
        radial-gradient(ellipse at 20% 50%,rgba(74,107,138,.18) 0%,transparent 60%),
        radial-gradient(ellipse at 80% 20%,rgba(201,168,76,.07) 0%,transparent 50%);
      pointer-events:none;
    }
    .card{
      background:rgba(26,47,68,.75);
      border:.5px solid rgba(201,168,76,.2);
      border-radius:20px;
      padding:48px 40px;
      max-width:400px;width:100%;
      text-align:center;
      box-shadow:0 24px 64px rgba(0,0,0,.4),inset 0 1px 0 rgba(201,168,76,.1);
      position:relative;
    }
    .icon{font-size:52px;margin-bottom:20px;display:block;}
    .title{
      font-size:22px;font-weight:600;color:#e8f0f8;
      margin-bottom:8px;
    }
    .sub{font-size:14px;color:#8ba3bc;line-height:1.5;}

    /* spinner */
    .spinner{
      width:48px;height:48px;border-radius:50%;
      border:3px solid rgba(201,168,76,.2);
      border-top-color:#c9a84c;
      animation:spin .8s linear infinite;
      margin:0 auto 20px;
    }
    @keyframes spin{to{transform:rotate(360deg);}}

    .btn{
      display:inline-block;margin-top:24px;
      background:linear-gradient(135deg,#c9a84c,#e2c47a);
      color:#0f1e2e;border:none;border-radius:10px;
      padding:12px 28px;font-family:inherit;font-size:14px;font-weight:600;
      cursor:pointer;text-decoration:none;
      transition:opacity .2s;
    }
    .btn:hover{opacity:.88;}

    /* states */
    #stateLoading{display:block;}
    #stateSuccess{display:none;}
    #stateError  {display:none;}
  </style>
</head>
<body>
<div class="card">

  <!-- Loading -->
  <div id="stateLoading">
    <div class="spinner"></div>
    <div class="title">Confirming your account…</div>
    <div class="sub">Just a moment while we verify your email.</div>
  </div>

  <!-- Success -->
  <div id="stateSuccess">
    <span class="icon">✅</span>
    <div class="title">Email confirmed!</div>
    <div class="sub">You're all set! Taking you to your dashboard…</div>
    <a class="btn" id="dashLink" href="teacher.html">Go to dashboard</a>
  </div>

  <!-- Error -->
  <div id="stateError">
    <span class="icon">❌</span>
    <div class="title">Confirmation failed</div>
    <div class="sub" id="errorMsg">The link may have expired or already been used.</div>
    <a class="btn" href="instructor-login.html">Go to sign in</a>
  </div>

</div>

<script>
const _sb = window.supabase.createClient(
  'https://qkxhzpicqjxodeadhcvw.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFreGh6cGljcWp4b2RlYWRoY3Z3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNTg2NTUsImV4cCI6MjA5MjgzNDY1NX0.wLL0h9vQ8W5xp7mKFbq-CphiqE4cRVGTQ-KayuteHt8'
);

function show(state, errMsg) {
  document.getElementById('stateLoading').style.display = 'none';
  document.getElementById('stateSuccess').style.display = 'none';
  document.getElementById('stateError').style.display   = 'none';
  document.getElementById('state' + state).style.display = 'block';
  if (errMsg) document.getElementById('errorMsg').textContent = errMsg;
}

function redirectSoon() {
  var next = new URLSearchParams(window.location.search).get('next') || 'teacher.html';
  // only allow relative paths to this same origin
  if (next.startsWith('http') || next.includes('//')) next = 'teacher.html';
  setTimeout(function() { window.location.href = next; }, 2500);
}

(function() {
  var next = new URLSearchParams(window.location.search).get('next') || 'teacher.html';
  if (next.startsWith('http') || next.includes('//')) next = 'teacher.html';
  var link = document.getElementById('dashLink');
  if (link) link.href = next;
})();

(async function() {
  try {
    var search = new URLSearchParams(window.location.search);
    var hash   = new URLSearchParams(window.location.hash.replace('#', '?'));

    // ── Method 1: token_hash in query string (Supabase OTP / magic link flow) ──
    var token_hash = search.get('token_hash');
    var type       = search.get('type') || 'signup';

    if (token_hash) {
      var { error } = await _sb.auth.verifyOtp({ token_hash: token_hash, type: type });
      if (error) { show('Error', error.message); return; }
      show('Success');
      redirectSoon();
      return;
    }

    // ── Method 2: access_token in URL hash (older Supabase implicit flow) ──
    var accessToken  = hash.get('access_token');
    var refreshToken = hash.get('refresh_token');

    if (accessToken) {
      var { error } = await _sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken || '' });
      if (error) { show('Error', error.message); return; }
      show('Success');
      redirectSoon();
      return;
    }

    // ── Method 3: PKCE code in query string ──
    var code = search.get('code');

    if (code) {
      var { error } = await _sb.auth.exchangeCodeForSession(code);
      if (error) { show('Error', error.message); return; }
      show('Success');
      redirectSoon();
      return;
    }

    // No token found at all — probably landed here directly
    show('Error', 'No confirmation token found in the URL. Please use the link from your email.');

  } catch(e) {
    show('Error', e.message || 'An unexpected error occurred.');
  }
})();
</script>
</body>
</html>

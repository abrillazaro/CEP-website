<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>English Placement Test — The Corporate English Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy:#20395c;--navy-deep:#152840;--navy-soft:#54688a;
    --sage:#5d7c69;--sage-deep:#465c4f;--sage-tint:#dce7dd;
    --bg:#f1f3ef;--bg-2:#eaeee8;--surface:#ffffff;--surface-soft:#f8faf6;
    --line:#e0e4dd;--line-strong:#cdd4c9;--ink:#1e2a3a;--muted:#6c7787;
    --serif:"Playfair Display",Georgia,serif;
    --sans:"Hanken Grotesk",system-ui,sans-serif;
    --shadow-sm:0 1px 2px rgba(21,40,64,.05),0 1px 3px rgba(21,40,64,.06);
    --shadow-md:0 6px 16px rgba(21,40,64,.08),0 2px 6px rgba(21,40,64,.05);
    --shadow-lg:0 22px 50px -12px rgba(21,40,64,.22),0 8px 20px rgba(21,40,64,.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;min-height:100vh;}
  #root{min-height:100vh;}
  ::selection{background:var(--sage-tint);color:var(--navy-deep);}
  button{font-family:inherit;cursor:pointer;}
  input,textarea{font-family:inherit;}
  @keyframes riseIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}

  .page{position:relative;min-height:100vh;display:flex;flex-direction:column;}

  /* Nav */
  .nav{position:relative;z-index:5;display:flex;align-items:center;justify-content:space-between;
    padding:22px 40px;max-width:1320px;margin:0 auto;width:100%;}
  .nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--navy);}
  .nav-logo img{height:60px;width:auto;display:block;}
  .nav-right{display:flex;align-items:center;gap:10px;}
  .lang-toggle{display:flex;align-items:center;gap:7px;border:1px solid var(--line-strong);
    background:var(--surface);border-radius:999px;padding:7px 13px;font-size:14px;font-weight:600;
    color:var(--navy);box-shadow:var(--shadow-sm);}
  .nav-link{padding:9px 14px;border-radius:10px;color:var(--navy);text-decoration:none;
    font-weight:600;font-size:15px;background:transparent;border:none;transition:background .15s;}
  .nav-link:hover{background:rgba(32,57,92,.07);}
  .nav-link.active{background:rgba(32,57,92,.09);}
  .seg{border:none;background:transparent;border-radius:999px;padding:4px 11px;
    font-weight:700;font-size:13px;transition:all .15s;cursor:pointer;}

  /* Sections */
  .section{position:relative;z-index:2;}
  .sec-wrap{position:relative;max-width:1080px;margin:0 auto;padding:0 40px;}
  .sec-title{font-family:var(--serif);font-weight:600;color:var(--navy);letter-spacing:-.01em;
    font-size:clamp(36px,5vw,60px);line-height:1.05;margin:0 0 20px;}
  .sec-rule{width:64px;height:3px;background:var(--sage);border-radius:2px;margin:0 0 26px;}
  .sec-intro{color:var(--muted);font-size:clamp(16px,1.4vw,18px);line-height:1.7;
    max-width:640px;margin:0 0 40px;}

  /* Form fields */
  .cfield input{width:100%;border:1.5px solid var(--line-strong);border-radius:12px;
    padding:15px 16px;font-size:15px;color:var(--ink);outline:none;
    transition:border-color .15s,box-shadow .15s;background:var(--surface);}
  .cfield input:focus{border-color:var(--sage);box-shadow:0 0 0 3px rgba(93,124,105,.15);}
  .cfield input::placeholder{color:var(--navy-soft);}

  /* Placement form */
  .ptest-area{padding:80px 0 72px;border-top:1px solid var(--line);}
  .ptest-wrap{max-width:700px;}
  .ptest-fields{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:32px;}
  .ptest-fields .cfield{flex:1;min-width:200px;}
  .pq{background:var(--surface);border:1px solid var(--line);border-radius:18px;
    padding:24px 26px;box-shadow:var(--shadow-sm);margin-bottom:20px;}
  .pq-label{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:var(--sage-deep);margin-bottom:10px;}
  .pq-text{font-size:16.5px;color:var(--ink);line-height:1.5;margin:0 0 16px;font-weight:500;}
  .pq-opts{display:flex;flex-direction:column;gap:9px;}
  .pq-opt{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;
    border:1.5px solid var(--line);border-radius:11px;cursor:pointer;
    transition:border-color .15s,background .15s;user-select:none;}
  .pq-opt:hover{border-color:var(--sage);}
  .pq-opt.sel{border-color:var(--sage);background:rgba(220,231,221,.3);}
  .pq-opt input[type=radio]{margin-top:3px;flex-shrink:0;accent-color:var(--sage);}
  .pq-opt span{font-size:15px;color:var(--ink);line-height:1.4;}
  .pq-open textarea{width:100%;border:1.5px solid var(--line-strong);border-radius:12px;
    padding:14px 16px;font-size:15px;color:var(--ink);font-family:var(--sans);outline:none;
    resize:vertical;min-height:90px;background:var(--surface);
    transition:border-color .15s,box-shadow .15s;display:block;}
  .pq-open textarea:focus{border-color:var(--sage);box-shadow:0 0 0 3px rgba(93,124,105,.15);}
  .ptest-btn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:14px;
    padding:18px;font-weight:700;font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .2s,transform .12s;}
  .ptest-btn:hover{background:var(--navy-deep);transform:translateY(-1px);}
  .ptest-btn:disabled{opacity:.45;cursor:default;transform:none;}
  .ptest-note{font-size:13px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.5;}
  .ptest-err{color:#c0563f;font-size:14px;text-align:center;margin:0 0 14px;}
  .spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.4);
    border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
  .ptest-done{display:flex;flex-direction:column;align-items:center;text-align:center;
    padding:80px 20px;gap:18px;animation:riseIn .4s ease both;}
  .ptest-done-ring{width:72px;height:72px;border-radius:50%;background:var(--sage-tint);
    display:flex;align-items:center;justify-content:center;color:var(--sage-deep);}
  .ptest-done h3{font-family:var(--serif);font-size:30px;color:var(--navy);margin:0;}
  .ptest-done p{color:var(--muted);font-size:16px;max-width:420px;line-height:1.65;margin:0;}
  .foot-cep{text-align:center;color:var(--muted);font-size:14px;padding:38px 0 18px;
    letter-spacing:.01em;}

  @media(max-width:820px){
    .nav{padding-left:20px;padding-right:20px;}
    .sec-wrap{padding-left:22px;padding-right:22px;}
    .nav-link.hide-sm{display:none;}
    .ptest-area{padding-top:60px;padding-bottom:48px;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useEffect } = React;

// To collect submissions: sign up free at formspree.io, create a form,
// paste your endpoint here e.g. "https://formspree.io/f/xyzabc12"
const FORMSPREE_ENDPOINT = "";

const STR = {
  en: {
    home: "Home", about: "About", test: "Placement Test",
    placementTitle: "English Placement Test",
    placementIntro: "Help us understand your current level so we can build the right learning path for you. There are no right or wrong answers — just answer as honestly as you can.",
    placementLevel: "How would you describe your current English level?",
    placementLevels: ["A1 – Complete beginner","A2 – Elementary","B1 – Intermediate","B2 – Upper-intermediate","C1 – Advanced","C2 – Proficient / Native-like"],
    placementSubmit: "Submit placement test",
    placementNote: "Your answers are confidential and used only to personalize your learning path.",
    placementDoneTitle: "Test received!",
    placementDoneBody: "Thank you. We will review your answers and reach out within 48 hours with your recommended learning path.",
    placementErr: "Something went wrong. Please try again or contact us directly.",
    fFullName: "Full name", fEmail: "Email",
    footer: "© The Corporate English Project · CEP · México, México",
  },
  es: {
    home: "Inicio", about: "Nosotros", test: "Examen de Nivel",
    placementTitle: "Examen de Nivel de Inglés",
    placementIntro: "Ayúdanos a entender tu nivel actual para armar el camino de aprendizaje ideal para ti. No hay respuestas correctas ni incorrectas — contesta con honestidad.",
    placementLevel: "¿Cómo describirías tu nivel actual de inglés?",
    placementLevels: ["A1 – Principiante completo","A2 – Elemental","B1 – Intermedio","B2 – Intermedio-alto","C1 – Avanzado","C2 – Competente / Casi nativo"],
    placementSubmit: "Enviar examen de nivel",
    placementNote: "Tus respuestas son confidenciales y se usan únicamente para personalizar tu experiencia.",
    placementDoneTitle: "¡Examen recibido!",
    placementDoneBody: "Gracias. Revisaremos tus respuestas y nos comunicaremos contigo en 48 horas con tu ruta de aprendizaje recomendada.",
    placementErr: "Algo salió mal. Inténtalo de nuevo o contáctanos directamente.",
    fFullName: "Nombre completo", fEmail: "Correo electrónico",
    footer: "© The Corporate English Project · CEP · México, México",
  },
};

const QUESTIONS = [
  { id:"q1", num:1,
    text:"Which sentence is grammatically correct?",
    opts:[
      "I am work here since 2020.",
      "I have been working here since 2020.",
      "I working here since 2020.",
      "I work here since 2020 years.",
    ]},
  { id:"q2", num:2,
    text:"In a professional email, which phrase is the most appropriate way to say you cannot attend a meeting?",
    opts:[
      "I can't make it, sorry.",
      "Count me out.",
      "I regret that I will be unable to attend.",
      "I won't be going to that.",
    ]},
  { id:"q3", num:3,
    text:"Choose the correctly written sentence:",
    opts:[
      "The report needs to reviewed by Friday.",
      "The report needs to be reviewed by Friday.",
      "The report needs reviewed by Friday.",
      "The report need to be review by Friday.",
    ]},
  { id:"q4", num:4,
    text:"What does 'to get the ball rolling' mean in a business context?",
    opts:[
      "To end a project or meeting",
      "To make a final decision",
      "To start a process or initiative",
      "To assign responsibility to someone",
    ]},
  { id:"q5", num:5,
    text:"Complete this sentence with the correct verb form: 'If we had received the contract earlier, we ___ the project on time.'",
    opts:[
      "will have finished",
      "would have finished",
      "would finish",
      "had finished",
    ]},
  { id:"q6", num:6,
    text:"A client asks if you received their email. Which response sounds most professional?",
    opts:[
      "Yep, got it.",
      "Yeah, saw it — will reply soon.",
      "Yes, I received your email and will respond shortly.",
      "Got it, will hit you back.",
    ]},
  { id:"q7", num:7,
    text:"Choose the sentence with the correct preposition:",
    opts:[
      "She is responsible of the entire team.",
      "She is responsible to the entire team.",
      "She is responsible at the entire team.",
      "She is responsible for the entire team.",
    ]},
  { id:"q8", num:8, type:"open",
    text:"In English, describe your current job or area of study in 2–3 sentences." },
  { id:"q9", num:9, type:"open",
    text:"What is your biggest challenge when using English at work or school?" },
];

function Icon({ name, size = 22, stroke = 2 }) {
  const p = { width:size, height:size, viewBox:"0 0 24 24", fill:"none",
    stroke:"currentColor", strokeWidth:stroke, strokeLinecap:"round", strokeLinejoin:"round" };
  switch(name) {
    case "globe": return <svg {...p}><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18Z"/></svg>;
    case "check": return <svg {...p}><path d="m5 12 4.5 4.5L19 7"/></svg>;
    default: return null;
  }
}

function segStyle(active) {
  return { border:"none", background: active ? "var(--navy)" : "transparent",
    color: active ? "#fff" : "var(--navy-soft)", borderRadius:999,
    padding:"4px 11px", fontWeight:700, fontSize:13, transition:"all .15s" };
}

function Nav({ t, lang, setLang }) {
  return (
    <nav className="nav">
      <a className="nav-logo" href="index.html" aria-label="Home">
        <img src="logo-navy.png" alt="The Corporate English Project" />
      </a>
      <div className="nav-right">
        <div className="lang-toggle" role="group" aria-label="Language">
          <Icon name="globe" size={17} stroke={2} />
          <button className="seg" onClick={() => setLang("en")} style={segStyle(lang === "en")}>EN</button>
          <button className="seg" onClick={() => setLang("es")} style={segStyle(lang === "es")}>ES</button>
        </div>
        <a className="nav-link hide-sm" href="index.html">{t.home}</a>
        <a className="nav-link hide-sm" href="about.html">{t.about}</a>
        <a className="nav-link active" href="placement.html">{t.test}</a>
      </div>
    </nav>
  );
}

function PlacementPage() {
  const [lang, setLang] = useState(() => {
    try { return localStorage.getItem("cep-lang") || "en"; } catch { return "en"; }
  });
  const t = STR[lang] || STR.en;

  useEffect(() => {
    try { localStorage.setItem("cep-lang", lang); } catch {}
    document.documentElement.lang = lang;
  }, [lang]);

  const [name, setName]       = useState("");
  const [email, setEmail]     = useState("");
  const [level, setLevel]     = useState("");
  const [answers, setAnswers] = useState({});
  const [busy, setBusy]       = useState(false);
  const [done, setDone]       = useState(false);
  const [err, setErr]         = useState("");

  const setAns = (id, val) => setAnswers(prev => ({ ...prev, [id]: val }));

  const handleSubmit = async e => {
    e.preventDefault();
    setErr("");
    setBusy(true);

    const payload = {
      _subject: `CEP Placement Test — ${name}`,
      name, email,
      "Self-assessed level": level,
      ...Object.fromEntries(QUESTIONS.map(q =>
        [`Q${q.num}: ${q.text.slice(0, 72)}…`, answers[q.id] || ""]
      )),
    };

    try {
      const saved = JSON.parse(localStorage.getItem("cep-placements") || "[]");
      saved.push({ ...payload, submittedAt: new Date().toISOString() });
      localStorage.setItem("cep-placements", JSON.stringify(saved));
    } catch {}

    if (FORMSPREE_ENDPOINT) {
      try {
        const res = await fetch(FORMSPREE_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!res.ok) { setErr(t.placementErr); setBusy(false); return; }
      } catch { setErr(t.placementErr); setBusy(false); return; }
    }

    setDone(true);
    setBusy(false);
  };

  return (
    <div className="page">
      <Nav t={t} lang={lang} setLang={setLang} />

      <section className="section" id="placement">
        <div className="sec-wrap ptest-area">
          {done ? (
            <div className="ptest-done">
              <div className="ptest-done-ring"><Icon name="check" size={32} stroke={2.5} /></div>
              <h3>{t.placementDoneTitle}</h3>
              <p>{t.placementDoneBody}</p>
            </div>
          ) : (
            <>
              <h2 className="sec-title">{t.placementTitle}</h2>
              <div className="sec-rule" />
              <p className="sec-intro">{t.placementIntro}</p>

              <form className="ptest-wrap" onSubmit={handleSubmit}>
                <div className="ptest-fields">
                  <div className="cfield">
                    <input type="text" placeholder={t.fFullName} value={name}
                      onChange={e => setName(e.target.value)} required />
                  </div>
                  <div className="cfield">
                    <input type="email" placeholder={t.fEmail} value={email}
                      onChange={e => setEmail(e.target.value)} required />
                  </div>
                </div>

                <div className="pq">
                  <div className="pq-label">Self-assessment</div>
                  <div className="pq-text">{t.placementLevel}</div>
                  <div className="pq-opts">
                    {t.placementLevels.map(lv => (
                      <label key={lv} className={"pq-opt" + (level === lv ? " sel" : "")}>
                        <input type="radio" name="level" value={lv}
                          checked={level === lv} onChange={() => setLevel(lv)} required />
                        <span>{lv}</span>
                      </label>
                    ))}
                  </div>
                </div>

                {QUESTIONS.map(q => (
                  <div key={q.id} className="pq">
                    <div className="pq-label">Question {q.num}</div>
                    <div className="pq-text">{q.text}</div>
                    {q.type === "open" ? (
                      <div className="pq-open">
                        <textarea placeholder="Write your answer here…"
                          value={answers[q.id] || ""}
                          onChange={e => setAns(q.id, e.target.value)} required />
                      </div>
                    ) : (
                      <div className="pq-opts">
                        {q.opts.map((opt, j) => (
                          <label key={j} className={"pq-opt" + (answers[q.id] === opt ? " sel" : "")}>
                            <input type="radio" name={q.id} value={opt}
                              checked={answers[q.id] === opt} onChange={() => setAns(q.id, opt)} required />
                            <span>{opt}</span>
                          </label>
                        ))}
                      </div>
                    )}
                  </div>
                ))}

                <div style={{ marginTop:8 }}>
                  {err ? <p className="ptest-err">{err}</p> : null}
                  <button className="ptest-btn" type="submit" disabled={busy}>
                    {busy ? <span className="spinner" /> : t.placementSubmit}
                  </button>
                  <p className="ptest-note">{t.placementNote}</p>
                </div>
              </form>
            </>
          )}
          <p className="foot-cep">{t.footer}</p>
        </div>
      </section>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PlacementPage />);
</script>
</body>
</html>

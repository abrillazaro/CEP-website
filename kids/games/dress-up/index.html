<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>ZoeStyle Dress Up — CEP Kids</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & VARS ─────────────────────────────────────── */
:root{
  --font:'Nunito',system-ui,sans-serif;
  --pink:#FF9EB5;--purple:#C084FC;--gold:#F1C40F;
  --bg1:#FFE5F1;--bg2:#FFF5E5;--bg3:#EAE5FF;
  --panel:rgba(255,255,255,.88);--radius:18px;
  --shadow:0 6px 24px rgba(0,0,0,.10);
  --cat-w:72px;--right-w:310px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 50%,var(--bg3) 100%);
  min-height:100vh;overflow:hidden;user-select:none;-webkit-user-select:none;}

/* ── TOP BAR ─────────────────────────────────────────── */
#topbar{
  height:54px;display:flex;align-items:center;gap:10px;padding:0 14px;
  background:rgba(255,255,255,.82);backdrop-filter:blur(14px);
  border-bottom:2px solid rgba(255,158,181,.25);position:relative;z-index:60;flex-shrink:0;
}
.tb-back{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:800;
  color:#888;text-decoration:none;background:rgba(255,158,181,.15);
  padding:6px 12px;border-radius:20px;transition:background .15s;}
.tb-back:hover{background:rgba(255,158,181,.3);}
.tb-title{flex:1;text-align:center;font-size:18px;font-weight:900;
  background:linear-gradient(135deg,#FF6B9D,#C084FC);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#challenge-btn{
  flex-shrink:0;background:linear-gradient(135deg,#FFE66D,#FFB347);
  border:none;border-radius:20px;padding:7px 14px;
  font-family:var(--font);font-size:13px;font-weight:800;cursor:pointer;
  box-shadow:0 3px 10px rgba(255,179,71,.4);transition:transform .15s;}
#challenge-btn:hover{transform:scale(1.06);}

/* ── GAME WRAPPER ────────────────────────────────────── */
#game{display:flex;height:calc(100vh - 54px);overflow:hidden;}

/* ── DOLL COLUMN (left) ──────────────────────────────── */
.doll-col{
  flex:1;min-width:0;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 50% 60%,rgba(255,158,181,.18) 0%,transparent 70%),
             radial-gradient(ellipse at 30% 20%,rgba(192,132,252,.12) 0%,transparent 60%);
}
.doll-platform{
  position:absolute;bottom:48px;left:50%;transform:translateX(-50%);
  width:220px;height:36px;
  background:radial-gradient(ellipse,rgba(192,132,252,.22) 0%,transparent 70%);
  border-radius:50%;pointer-events:none;
}
#doll-svg{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;overflow:visible;
}
.zoe-wrapper{
  position:relative;display:inline-flex;
  max-height:calc(100vh - 120px);
}
#zoe-base{
  display:block;max-height:calc(100vh - 120px);width:auto;max-width:100%;
  filter:drop-shadow(0 8px 22px rgba(0,0,0,.13));
}
#hair-overlay-img{
  position:absolute;
  top:5%;
  left:50%;
  transform:translateX(-50%);
  width:31%;
  height:auto;
  pointer-events:none;
  display:none;
}

/* Wearing bar */
#wearing-bar{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:20;
}
.wearing-btn{
  background:linear-gradient(135deg,#FF6B9D,#C084FC);color:#fff;
  border:none;border-radius:24px;padding:9px 18px;
  font-family:var(--font);font-size:12.5px;font-weight:800;cursor:pointer;
  box-shadow:0 4px 14px rgba(192,107,157,.4);transition:transform .15s;white-space:nowrap;
}
.wearing-btn:hover{transform:translateY(-2px);}
#p2-trigger{display:none;}

/* ── CATEGORY STRIP (middle) ─────────────────────────── */
.cats-col{
  width:var(--cat-w);flex-shrink:0;
  background:var(--panel);backdrop-filter:blur(16px);
  border-left:.5px solid rgba(255,255,255,.6);
  border-right:.5px solid rgba(255,255,255,.6);
  display:flex;flex-direction:column;align-items:center;
  padding:10px 0;gap:6px;overflow-y:auto;overflow-x:hidden;
  scrollbar-width:none;
}
.cats-col::-webkit-scrollbar{display:none;}
.cat-btn{
  width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-size:22px;line-height:1;background:rgba(255,255,255,.7);
  transition:all .18s;box-shadow:0 2px 8px rgba(0,0,0,.07);
  flex-shrink:0;position:relative;
}
.cat-btn:hover{transform:scale(1.08);box-shadow:0 4px 14px rgba(0,0,0,.12);}
.cat-btn.active{
  background:linear-gradient(135deg,#FF9EB5,#C084FC);
  box-shadow:0 4px 16px rgba(192,132,252,.45);transform:scale(1.06);
}
.cat-btn-label{font-size:8.5px;font-weight:800;color:#888;margin-top:2px;}
.cat-btn.active .cat-btn-label{color:#fff;}

/* ── ITEMS COLUMN (right) ────────────────────────────── */
.items-col{
  width:var(--right-w);flex-shrink:0;
  background:var(--panel);backdrop-filter:blur(16px);
  border-left:.5px solid rgba(255,255,255,.5);
  display:flex;flex-direction:column;overflow:hidden;
}
.items-hdr{
  padding:12px 14px 8px;flex-shrink:0;
  font-size:15px;font-weight:900;
  background:linear-gradient(135deg,#FF6B9D,#C084FC);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.items-scroll{flex:1;overflow-y:auto;padding:0 10px 6px;scrollbar-width:thin;scrollbar-color:rgba(192,132,252,.3) transparent;}
.items-scroll::-webkit-scrollbar{width:4px;}
.items-scroll::-webkit-scrollbar-thumb{background:rgba(192,132,252,.3);border-radius:4px;}

/* Item cards */
.items-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-bottom:6px;}
.item-card{
  background:#fff;border-radius:14px;padding:10px 6px 8px;
  border:2.5px solid transparent;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:all .16s;box-shadow:0 2px 8px rgba(0,0,0,.07);
}
.item-card:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,.12);}
.item-card.selected{
  border-color:var(--purple);
  box-shadow:0 0 0 3px rgba(192,132,252,.3),0 4px 12px rgba(0,0,0,.1);
  background:linear-gradient(135deg,rgba(255,158,181,.1),rgba(192,132,252,.1));
  transform:translateY(-2px) scale(1.04);
}
.item-emoji{font-size:28px;line-height:1;display:block;}
.item-label{font-size:10px;font-weight:800;color:#555;text-align:center;line-height:1.2;}

/* ── PALETTE ─────────────────────────────────────────── */
.palette-area{flex-shrink:0;padding:0 10px 8px;}
.section-title{
  font-size:11px;font-weight:900;color:#999;letter-spacing:.5px;
  text-transform:uppercase;padding:8px 2px 6px;display:flex;align-items:center;gap:4px;
}
.colors-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:2px;}
.color-swatch{
  width:100%;aspect-ratio:1;border-radius:50%;cursor:pointer;
  border:2.5px solid rgba(255,255,255,.7);
  box-shadow:0 2px 6px rgba(0,0,0,.12);
  transition:all .15s;position:relative;
}
.color-swatch:hover{transform:scale(1.18);z-index:1;}
.color-swatch.selected{
  border-color:#fff;
  box-shadow:0 0 0 3px var(--purple),0 2px 8px rgba(0,0,0,.15);
  transform:scale(1.15);z-index:1;
}
.color-swatch.selected::after{
  content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5);
}

/* Patterns */
.patterns-row{display:flex;gap:5px;flex-wrap:wrap;}
.pattern-btn{
  flex:1;min-width:52px;padding:6px 4px;border:2px solid transparent;border-radius:10px;
  background:#fff;cursor:pointer;font-family:var(--font);
  display:flex;flex-direction:column;align-items:center;gap:2px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);transition:all .15s;
}
.pattern-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12);}
.pattern-btn.selected{
  border-color:var(--purple);background:linear-gradient(135deg,rgba(255,158,181,.15),rgba(192,132,252,.15));
  box-shadow:0 0 0 2px rgba(192,132,252,.3);
}
.pat-emoji{font-size:16px;line-height:1;}
.pat-label{font-size:9px;font-weight:800;color:#777;}

/* ── TOOLTIP ─────────────────────────────────────────── */
#tip{
  position:fixed;background:#fff;color:#222;padding:6px 14px;border-radius:22px;
  font-family:var(--font);font-size:13px;font-weight:800;
  box-shadow:0 4px 16px rgba(0,0,0,.15);border:2px solid var(--pink);
  pointer-events:none;z-index:9999;white-space:nowrap;display:none;
}

/* ── SPARKLES ────────────────────────────────────────── */
.spark{position:absolute;pointer-events:none;font-size:18px;
  animation:sparkFly .85s ease-out forwards;}
@keyframes sparkFly{
  0%{transform:translate(-50%,-50%) scale(0) rotate(0deg);opacity:1;}
  100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.1) rotate(var(--rot));opacity:0;}
}
#sparkle-box{position:absolute;inset:0;pointer-events:none;overflow:hidden;}

/* ── CHALLENGE POPUP ─────────────────────────────────── */
.pop-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;}
#challenge-pop{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:#fff;border-radius:22px;padding:28px 32px;
  box-shadow:0 20px 60px rgba(0,0,0,.18);z-index:210;
  text-align:center;max-width:320px;width:90%;display:none;
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1) forwards;
}
#challenge-pop h3{font-size:28px;margin-bottom:10px;}
#challenge-pop p{font-size:17px;font-weight:700;color:#666;line-height:1.45;margin-bottom:18px;}
.pop-close{background:linear-gradient(135deg,#FF6B9D,#C084FC);color:#fff;border:none;
  border-radius:20px;padding:9px 24px;font-family:var(--font);font-size:14px;font-weight:800;cursor:pointer;}
@keyframes popIn{
  from{transform:translate(-50%,-50%) scale(.7);opacity:0;}
  to{transform:translate(-50%,-50%) scale(1);opacity:1;}
}

/* ── PHASE 2 ─────────────────────────────────────────── */
#phase2{
  position:fixed;inset:0;z-index:300;
  background:linear-gradient(135deg,#FFE5F1,#F0E5FF,#E5F0FF);
  display:none;flex-direction:column;align-items:center;
  overflow-y:auto;padding:22px 16px 48px;
  animation:slideUp .5s cubic-bezier(.34,1.36,.64,1) forwards;
}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
#p2-header{text-align:center;margin-bottom:14px;}
#p2-header h2{font-size:clamp(20px,4vw,28px);font-weight:900;
  background:linear-gradient(135deg,#FF6B9D,#C084FC);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:5px;}
#p2-header p{font-size:14px;color:#999;font-weight:700;}
#p2-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px;max-width:600px;}
.p2-chip{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:800;
  border:2px solid rgba(0,0,0,.07);box-shadow:0 2px 8px rgba(0,0,0,.07);}
#p2-story{background:#fff;border-radius:var(--radius);padding:20px 24px;
  box-shadow:var(--shadow);max-width:560px;width:100%;
  font-size:clamp(15px,3vw,19px);font-weight:700;color:#333;
  line-height:2;margin-bottom:20px;}
.s-blank{display:inline-block;min-width:80px;border-bottom:3px solid var(--pink);
  text-align:center;font-weight:900;padding:0 6px;margin:0 3px;vertical-align:bottom;line-height:1.4;transition:all .2s;}
.s-blank.active{border-color:var(--purple);background:rgba(192,132,252,.1);border-radius:6px;animation:blinkB 1s infinite;}
.s-blank.done{color:#222;border-color:transparent;background:linear-gradient(135deg,rgba(255,158,181,.25),rgba(192,132,252,.2));
  border-radius:8px;animation:fillPop .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes blinkB{0%,100%{border-color:var(--purple);}50%{border-color:rgba(192,132,252,.25);}}
@keyframes fillPop{0%{transform:scale(.8);opacity:0;}60%{transform:scale(1.12);}100%{transform:scale(1);opacity:1;}}
#p2-prompt{font-size:14px;font-weight:800;color:var(--purple);text-align:center;margin-bottom:12px;max-width:560px;width:100%;}
#p2-choices{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:560px;width:100%;margin-bottom:18px;}
.choice-btn{
  flex:1;min-width:120px;max-width:175px;padding:14px 8px;border-radius:16px;border:none;
  font-family:var(--font);font-size:15px;font-weight:800;cursor:pointer;
  background:#fff;color:#333;box-shadow:0 4px 14px rgba(0,0,0,.1);transition:all .15s;
}
.choice-btn:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.13);}
.choice-btn.correct{background:linear-gradient(135deg,#A8EDAB,#56C596);color:#fff;animation:cPop .5s cubic-bezier(.34,1.56,.64,1);}
.choice-btn.wrong{animation:wShake .4s ease;}
@keyframes cPop{0%{transform:scale(.9);}60%{transform:scale(1.12);}100%{transform:scale(1);}}
@keyframes wShake{0%,100%{transform:translateX(0);}20%{transform:translateX(-7px);}40%{transform:translateX(7px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}
#p2-cheer{font-size:18px;font-weight:900;text-align:center;margin-bottom:10px;display:none;
  background:linear-gradient(135deg,#FF6B9D,#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#p2-done{display:none;flex-direction:column;align-items:center;gap:10px;max-width:360px;width:100%;}
.p2-btn{width:100%;padding:14px;border:none;border-radius:20px;font-family:var(--font);
  font-size:16px;font-weight:900;cursor:pointer;transition:transform .15s;}
.p2-btn:hover{transform:translateY(-3px);}
#p2-read{background:linear-gradient(135deg,#FF6B9D,#C084FC);color:#fff;box-shadow:0 5px 18px rgba(192,107,157,.4);}
#p2-again{background:linear-gradient(135deg,#FFE66D,#FFB347);color:#fff;box-shadow:0 5px 18px rgba(255,179,71,.35);}

/* ── MOBILE ─────────────────────────────────────────── */
#mobile-bottom{display:none;flex-direction:column;flex-shrink:0;
  background:var(--panel);border-top:1.5px solid rgba(255,158,181,.2);
  max-height:56vh;overflow:hidden;}
.mob-cats{display:flex;overflow-x:auto;gap:6px;padding:8px 10px;
  background:rgba(255,158,181,.1);scrollbar-width:none;flex-shrink:0;}
.mob-cats::-webkit-scrollbar{display:none;}
.mob-cat-btn{flex-shrink:0;padding:6px 14px;border:none;border-radius:20px;
  font-family:var(--font);font-size:12px;font-weight:800;
  cursor:pointer;background:rgba(255,255,255,.75);color:#888;transition:all .15s;}
.mob-cat-btn.active{background:linear-gradient(135deg,#FF9EB5,#C084FC);color:#fff;}
#mob-scroll{flex:1;overflow-y:auto;padding:6px 10px;}
.mob-items-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.mob-palette{padding:6px 10px 8px;display:flex;flex-direction:column;gap:4px;}
.mob-colors{display:flex;flex-wrap:wrap;gap:4px;}
.mob-patterns{display:flex;gap:4px;}

@media(max-width:767px){
  .doll-col{height:auto;flex:none;}
  .cats-col,.items-col{display:none;}
  #game{flex-direction:column;height:auto;overflow:visible;}
  body{overflow:auto;}
  .zoe-wrapper{max-height:40vh;}
  #zoe-base{max-height:40vh;}
  .doll-col{min-height:38vh;}
  #mobile-bottom{display:flex;}
  #wearing-bar{position:relative;bottom:auto;left:auto;transform:none;
    justify-content:center;padding:8px;}
  .mob-items-grid{grid-template-columns:repeat(4,1fr);}
}
@media(max-width:400px){.mob-items-grid{grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <a class="tb-back" href="../../index.html">← Kids</a>
  <span class="tb-title">👗 ZoeStyle Dress Up ✨</span>
  <button id="challenge-btn" onclick="showChallenge()">⭐ Challenge</button>
</div>

<!-- MAIN GAME -->
<div id="game">

  <!-- LEFT: Doll -->
  <div class="doll-col">
    <div class="doll-platform"></div>
    <div class="zoe-wrapper">
      <img id="zoe-base" src="zoe%20transparent.png" alt="Zoe"/>
      <img id="hair-overlay-img" src="" alt=""/>
      <svg id="doll-svg" viewBox="0 0 992 992" xmlns="http://www.w3.org/2000/svg">
        <defs id="doll-defs"></defs>

        <!-- DRESS layer -->
        <g id="svg-dress" style="display:none">
          <path id="svg-dress-top" d="M215,362 Q168,422 158,562 L834,562 Q824,422 777,362 Q650,326 496,326 Q340,326 215,362Z" fill="#E8D5E8"/>
          <path id="svg-dress-bot" d="M158,559 Q132,712 128,912 L864,912 Q860,712 834,559Z" fill="#E8D5E8"/>
        </g>

        <!-- TOP (transparent until item selected) -->
        <path id="svg-top" d="M215,362 Q168,422 158,562 L834,562 Q824,422 777,362 Q650,326 496,326 Q340,326 215,362Z" fill="transparent"/>

        <!-- BOTTOM (transparent until item selected) -->
        <path id="svg-bottom" d="M158,559 Q135,662 132,760 L860,760 Q857,662 834,559Z" fill="transparent"/>

        <!-- Hair back (hidden until hair item selected) -->
        <ellipse id="svg-hair-back" cx="496" cy="148" rx="154" ry="168" fill="#8B6356" style="display:none"/>

        <!-- Blush overlays — start invisible, activated by face items -->
        <ellipse id="blush-l" cx="308" cy="235" rx="82" ry="54" fill="#FFB0C0" opacity="0"/>
        <ellipse id="blush-r" cx="684" cy="235" rx="82" ry="54" fill="#FFB0C0" opacity="0"/>

        <!-- Mouth reference path (invisible; lip-gloss is drawn into face-overlay) -->
        <path id="svg-mouth" d="M436,282 Q496,316 556,282" stroke="none" fill="none" stroke-linecap="round"/>

        <!-- Face overlay (freckles, lip gloss, sparkle eyes) -->
        <g id="face-overlay"></g>

        <!-- Hair front (hidden until hair item selected) -->
        <g id="svg-hair-front" fill="#8B6356" style="display:none">
          <path d="M242,134 Q276,64 496,50 Q716,64 750,134 Q660,90 496,84 Q330,90 242,134Z"/>
          <path d="M242,134 Q212,210 232,292 Q252,210 266,154Z"/>
          <path d="M750,134 Q780,210 760,292 Q740,210 726,154Z"/>
        </g>

        <!-- Necklace -->
        <text id="acc-necklace" x="496" y="428" font-size="90"  text-anchor="middle" style="display:none">💎</text>

        <!-- Shoes (transparent until shoe item selected) -->
        <ellipse id="svg-shoe-l" cx="348" cy="924" rx="124" ry="46" fill="transparent"/>
        <ellipse id="svg-shoe-r" cx="644" cy="924" rx="124" ry="46" fill="transparent"/>

        <!-- Accessories -->
        <text id="acc-bag"      x="914" y="635" font-size="110" text-anchor="middle" style="display:none">👜</text>
        <text id="acc-crown"    x="496" y="56"  font-size="150" text-anchor="middle" style="display:none">👑</text>
        <text id="acc-hat"      x="496" y="46"  font-size="158" text-anchor="middle" style="display:none">🎩</text>
        <text id="acc-glasses"  x="496" y="196" font-size="118" text-anchor="middle" style="display:none">🕶️</text>
        <text id="acc-ear-l"    x="280" y="228" font-size="68"  text-anchor="middle" style="display:none">💕</text>
        <text id="acc-ear-r"    x="714" y="228" font-size="68"  text-anchor="middle" style="display:none">💕</text>

        <!-- Pattern emoji overlays -->
        <g id="pat-overlays"></g>
      </svg>
    </div>

    <div id="sparkle-box"></div>

    <div id="wearing-bar">
      <button class="wearing-btn" onclick="readOutfit()">🎤 What is she wearing?</button>
      <button class="wearing-btn" id="p2-trigger" onclick="startPhase2()">✨ Show my look!</button>
    </div>
  </div>

  <!-- MIDDLE: Category strip -->
  <div class="cats-col" id="cats-col"></div>

  <!-- RIGHT: Items + palette + patterns -->
  <div class="items-col">
    <div class="items-hdr" id="items-hdr">👕 Tops</div>
    <div class="items-scroll">
      <div class="items-grid" id="items-grid"></div>
    </div>
    <div class="palette-area">
      <div class="section-title">🎨 Color</div>
      <div class="colors-grid" id="colors-grid"></div>
      <div class="section-title" style="margin-top:4px">✨ Pattern</div>
      <div class="patterns-row" id="patterns-row"></div>
    </div>
  </div>

</div><!-- #game -->

<!-- MOBILE BOTTOM PANEL -->
<div id="mobile-bottom">
  <div class="mob-cats" id="mob-cats"></div>
  <div id="mob-scroll">
    <div class="mob-items-grid" id="mob-items-grid"></div>
  </div>
  <div class="mob-palette">
    <div class="section-title" style="padding:4px 2px 4px">🎨 Color</div>

<!-- ═══════════════════════════════════════════════════
     JAVASCRIPT
════════════════════════════════════════════════════ -->
<script>
/* ── DATA ─────────────────────────────────────────────── */
const CATEGORIES = [
  {id:'hair',        label:'Hair',        emoji:'💇', slot:'hair',      voice:'Hair'},
  {id:'face',        label:'Face',        emoji:'😊', slot:'face',      voice:'Face'},
  {id:'tops',        label:'Tops',        emoji:'👕', slot:'top',       voice:'Tops'},
  {id:'bottoms',     label:'Bottoms',     emoji:'👖', slot:'bottom',    voice:'Bottoms'},
  {id:'dresses',     label:'Dresses',     emoji:'👗', slot:'dress',     voice:'Dresses'},
  {id:'shoes',       label:'Shoes',       emoji:'👠', slot:'shoes',     voice:'Shoes'},
  {id:'accessories', label:'Acc',         emoji:'✨', slot:'accessory', voice:'Accessories'},
];

const ITEMS = {
  hair:[
    {id:'h1', label:'Pixie Cut', hairStyle:'pixiecut', img:'hair/whitepixiecut.png', voice:'pixie cut', noun:'pixie cut'},
    {id:'h2', label:'Bob',       hairStyle:'bob',       img:'hair/whitebob.png',      voice:'bob',        noun:'bob'},
  ],
  face:[],
  tops:[],
  bottoms:[],
  dresses:[],
  shoes:[],
  accessories:[],
};

const COLORS = [
  {id:'c1', name:'Red',          hex:'#E74C3C'},
  {id:'c2', name:'Pink',         hex:'#FF9EB5'},
  {id:'c3', name:'Hot Pink',     hex:'#FF1493'},
  {id:'c4', name:'Baby Blue',    hex:'#89CFF0'},
  {id:'c5', name:'Navy Blue',    hex:'#1B3A6B'},
  {id:'c6', name:'Turquoise',    hex:'#1ABC9C'},
  {id:'c7', name:'Lavender',     hex:'#D9B8F5'},
  {id:'c8', name:'Purple',       hex:'#9B59B6'},
  {id:'c9', name:'Yellow',       hex:'#F9E04B'},
  {id:'c10',name:'Gold',         hex:'#F1C40F'},
  {id:'c11',name:'Orange',       hex:'#F39C12'},
  {id:'c12',name:'Coral',        hex:'#FF6B6B'},
  {id:'c13',name:'White',        hex:'#F5F5F5'},
  {id:'c14',name:'Black',        hex:'#2C2C2C'},
  {id:'c15',name:'Gray',         hex:'#95A5A6'},
  {id:'c16',name:'Brown',        hex:'#8B6356'},
  {id:'c17',name:'Mint Green',   hex:'#A8E6CF'},
  {id:'c18',name:'Emerald Green',hex:'#2ECC71'},
];

const PATTERNS = [
  {id:'plain',   name:'Plain',      emoji:'⬜'},
  {id:'sparkly', name:'Sparkly',    emoji:'✨'},
  {id:'floral',  name:'Floral',     emoji:'🌸'},
  {id:'striped', name:'Striped',    emoji:'〰️'},
  {id:'polka',   name:'Polka Dots', emoji:'🔵'},
];

/* ── HAIR COLOR SYSTEM ───────────────────────────────── */
// Add a new array entry here each time a new color file is created.
// Map: computed color slug → actual filename slug (handles any naming discrepancies)
// To add a new color variant, add an entry here and drop the PNG in hair/.
const HAIR_COLOR_FILES = {
  bob: {
    white:        'white',
    brown:        'brown',
    black:        'black',
    hotpink:      'hotpink',
    pink:         'pink',
    red:          'red',
    purple:       'purple',
    lavender:     'lavender',
    navyblue:     'navyblue',
    babyblue:     'babyblue',
    turquoise:    'turqoise',     // file spelled turqoise
    coral:        'coral',
    gold:         'gold',
    emeraldgreen: 'green',        // palette name is 'Emerald Green'
    gray:         'grey',         // palette name is 'Gray', file is grey
    mintgreen:    'mintgreen',
    orange:       'orange',
    yellow:       'yellow',
  },
  pixiecut: {
    white:        'white',
    brown:        'brown',
    hotpink:      'hotpink',
    pink:         'pink',
    red:          'red',
    purple:       'purple',
    lavender:     'lavender',
    navyblue:     'navyblue',
    babyblue:     'babyblue',
    turquoise:    'turqoise',     // file spelled turqoise
    black:        'black',
    coral:        'coral',
    gold:         'gold',
    emeraldgreen: 'green',        // palette name is 'Emerald Green'
    gray:         'grey',         // palette name is 'Gray', file is grey
    mintgreen:    'mintgreen',
    orange:       'orange',
    yellow:       'yellow',
  },
};

function hairColorSlug(colorName){
  return colorName.toLowerCase().replace(/\s+/g,'');
}

function getHairImgSrc(hairStyle, colorName){
  const slug = hairColorSlug(colorName || 'white');
  const variants = HAIR_COLOR_FILES[hairStyle] || {};
  const fileSlug = variants[slug] !== undefined ? variants[slug] : 'white';
  return `hair/${fileSlug}${hairStyle}.png`;
}

/* ── STATE ───────────────────────────────────────────── */
// Each outfit slot tracks item, color, pattern independently
const slots = {
  hair:      {item:ITEMS.hair[0], color:COLORS[12], pattern:PATTERNS[0]}, // white pixie cut default
  face:      {item:null, color:COLORS[1],  pattern:PATTERNS[0]},
  top:       {item:null, color:COLORS[12], pattern:PATTERNS[0]}, // white (underwear look)
  bottom:    {item:null, color:COLORS[12], pattern:PATTERNS[0]}, // white
  dress:     {item:null, color:COLORS[2],  pattern:PATTERNS[0]}, // hot pink
  shoes:     {item:null, color:COLORS[12], pattern:PATTERNS[0]}, // white
  accessory: {item:null, color:COLORS[9],  pattern:PATTERNS[0]}, // gold
};
let activeCat = 'tops';
let p2Blanks = [];
let p2CurrentIdx = 0;

// Overlay positions for each slot (where emoji patterns float) — 992×992 space
const OVERLAY_POS = {
  top:    [[350,430],[496,470],[640,430],[420,400]],
  bottom: [[340,640],[496,680],[650,640],[420,720]],
  dress:  [[350,430],[640,430],[400,620],[590,660],[496,530]],
  shoes:  [[348,924],[644,924]],
  hair:   [[406,95],[586,95],[496,60]],
};

const NS = 'http://www.w3.org/2000/svg';

/* ── AUDIO (MP3 preferred, Web Speech fallback) ────────── */
const AUDIO_BASE = 'audio/';
const _audioCache = {};
let synth = window.speechSynthesis;
let voices = [];
let _pickedVoice = null;

function toAudioKey(text){
  return text.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_\-]/g,'');
}

function stopAudio(){
  Object.values(_audioCache).forEach(a=>{ try{a.pause();a.currentTime=0;}catch(e){} });
  synth && synth.cancel();
}

function playAudio(text, fallbackRate=0.9, fallbackPitch=1.1){
  const key = toAudioKey(text);
  stopAudio();
  if(!_audioCache[key]){
    const a = new Audio(AUDIO_BASE + key + '.mp3');
    a.onerror = ()=>{ a._missing=true; };
    _audioCache[key] = a;
  }
  const a = _audioCache[key];
  if(a._missing){ speak(text, fallbackRate, fallbackPitch); return; }
  a.currentTime = 0;
  a.play().catch(()=>{ a._missing=true; speak(text, fallbackRate, fallbackPitch); });
}

function loadVoices(){
  voices = synth.getVoices();
  if(!voices.length){ setTimeout(loadVoices, 150); return; }
  _pickedVoice =
    voices.find(v => v.name === 'Samantha') ||
    voices.find(v => v.name === 'Google US English') ||
    voices.find(v => /microsoft zira/i.test(v.name)) ||
    voices.find(v => v.lang === 'en-US' && v.localService === true) ||
    voices.find(v => v.lang === 'en-US') ||
    voices.find(v => /^en/i.test(v.lang));
}
loadVoices();
if(synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

function speak(text, rate=0.9, pitch=1.1){
  if(!synth) return;
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = rate; u.pitch = pitch; u.volume = 1;
  if(_pickedVoice) u.voice = _pickedVoice;
  synth.speak(u);
}
function cancelSpeech(){ stopAudio(); }

/* ── TOOLTIP ─────────────────────────────────────────── */
const tipEl = document.getElementById('tip');
function showTip(e, text){
  tipEl.textContent = text;
  tipEl.style.display = 'block';
  moveTip(e);
}
function moveTip(e){
  tipEl.style.left = (e.clientX + 14) + 'px';
  tipEl.style.top  = (e.clientY - 40) + 'px';
}
function hideTip(){
  tipEl.style.display='none';
  stopAudio();
}

/* ── PANEL RENDERING ─────────────────────────────────── */
function renderCategories(){
  const strip = document.getElementById('cats-col');
  const mobCats = document.getElementById('mob-cats');

  const btnHTML = CATEGORIES.map(c=>`
    <button class="cat-btn ${activeCat===c.id?'active':''}" id="catbtn-${c.id}"
      onclick="switchCat('${c.id}')"
      onmouseenter="playAudio('${c.voice}')"
      onmouseleave="stopAudio()">
      <span>${c.emoji}</span>
      <span class="cat-btn-label">${c.label}</span>
    </button>`).join('');
  strip.innerHTML = btnHTML;

  const mobHTML = CATEGORIES.map(c=>`
    <button class="mob-cat-btn ${activeCat===c.id?'active':''}" id="mobcatbtn-${c.id}"
      onclick="switchCat('${c.id}')">
      ${c.emoji} ${c.label}
    </button>`).join('');
  mobCats.innerHTML = mobHTML;
}

function renderItems(cat, gridId){
  const items = ITEMS[cat] || [];
  const slot = slotForCat(cat);
  document.getElementById(gridId).innerHTML = items.map(item=>`
    <div class="item-card ${slot.item?.id===item.id?'selected':''}"
      id="icard-${gridId}-${item.id}"
      onclick="selectItem('${item.id}','${cat}')"
      onmouseenter="onItemHover(event,'${item.id}','${cat}')"
      onmousemove="moveTip(event)"
      onmouseleave="hideTip()">
      ${item.img ? `<img src="${item.img}" style="width:44px;height:44px;object-fit:contain;border-radius:8px;" alt="${item.label}"/>` : `<span class="item-emoji">${item.emoji||''}</span>`}
      <span class="item-label">${item.label}</span>
    </div>`).join('');
}

function renderColors(gridId){
  const slot = slotForCat(activeCat);
  document.getElementById(gridId).innerHTML = COLORS.map(c=>`
    <div class="color-swatch ${slot.color?.id===c.id?'selected':''}"
      style="background:${c.hex}"
      title="${c.name}"
      onclick="selectColor('${c.id}')"
      onmouseenter="onColorHover(event,'${c.id}')"
      onmousemove="moveTip(event)"
      onmouseleave="hideTip()">
    </div>`).join('');
}

function renderPatterns(rowId){
  const slot = slotForCat(activeCat);
  document.getElementById(rowId).innerHTML = PATTERNS.map(p=>`
    <button class="pattern-btn ${slot.pattern?.id===p.id?'selected':''}"
      id="patbtn-${rowId}-${p.id}"
      onclick="selectPattern('${p.id}')"
      onmouseenter="onPatternHover(event,'${p.id}')"
      onmousemove="moveTip(event)"
      onmouseleave="hideTip()">
      <span class="pat-emoji">${p.emoji}</span>
      <span class="pat-label">${p.name}</span>
    </button>`).join('');
}

function renderAll(){
  const cat = activeCat;
  document.getElementById('items-hdr').textContent = catMeta(cat).emoji + ' ' + catMeta(cat).label;
  renderItems(cat,'items-grid');
  renderColors('colors-grid');
  renderPatterns('patterns-row');
  renderItems(cat,'mob-items-grid');
  renderColors('mob-colors');
  renderPatterns('mob-patterns');
  // update category button highlights
  CATEGORIES.forEach(c=>{
    document.getElementById('catbtn-'+c.id)?.classList.toggle('active',c.id===cat);
    document.getElementById('mobcatbtn-'+c.id)?.classList.toggle('active',c.id===cat);
  });
}

function switchCat(cat){
  activeCat = cat;
  renderAll();
}

function catMeta(catId){ return CATEGORIES.find(c=>c.id===catId)||CATEGORIES[0]; }
function slotForCat(catId){ return slots[CATEGORIES.find(c=>c.id===catId)?.slot] || slots.top; }

/* ── HOVER HANDLERS ──────────────────────────────────── */
function onItemHover(e, itemId, cat){
  const item = (ITEMS[cat]||[]).find(x=>x.id===itemId);
  if(!item) return;
  showTip(e, item.label);
  playAudio(item.voice);
}
function onColorHover(e, colorId){
  const c = COLORS.find(x=>x.id===colorId);
  if(!c) return;
  showTip(e, c.name);
  playAudio(c.name);
}
function onPatternHover(e, patId){
  const p = PATTERNS.find(x=>x.id===patId);
  if(!p) return;
  showTip(e, p.name);
  playAudio(p.name);
}

/* ── SELECTION LOGIC ─────────────────────────────────── */
function selectItem(itemId, cat){
  const item = (ITEMS[cat]||[]).find(x=>x.id===itemId);
  if(!item) return;
  const slotKey = catMeta(cat).slot;
  const slot = slots[slotKey];

  // Mutual exclusion: dress <-> top/bottom
  if(cat==='dresses'){ slots.top.item=null; slots.bottom.item=null; }
  else if(cat==='tops'||cat==='bottoms'){ slots.dress.item=null; }

  // Toggle
  slot.item = slot.item?.id===item.id ? null : item;

  updateDoll();
  renderAll();
  checkP2Btn();

  if(slot.item){
    const colorName = slot.color?.name || '';
    triggerSparkle();
    speak(`${colorName} ${item.voice}!`, 1, 1.15);
  }
}

function selectColor(colorId){
  const color = COLORS.find(x=>x.id===colorId);
  if(!color) return;
  const slotKey = catMeta(activeCat).slot;
  slots[slotKey].color = color;
  updateDoll();
  renderAll();
}

function selectPattern(patId){
  const pat = PATTERNS.find(x=>x.id===patId);
  if(!pat) return;
  const slotKey = catMeta(activeCat).slot;
  slots[slotKey].pattern = pat;
  updateDoll();
  renderAll();
}

function checkP2Btn(){
  const has = slots.dress.item || slots.top.item;
  document.getElementById('p2-trigger').style.display = has ? 'inline-block' : 'none';
}

/* ── DOLL UPDATE ─────────────────────────────────────── */
function lighten(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+50)},${Math.min(255,g+50)},${Math.min(255,b+50)})`;
}

function buildSVGPattern(patId, hex, patType){
  let pat = document.getElementById(patId);
  if(!pat){
    pat = document.createElementNS(NS,'pattern');
    pat.id = patId;
    document.getElementById('doll-defs').appendChild(pat);
  }
  pat.setAttribute('patternUnits','userSpaceOnUse');
  if(patType==='striped'){
    pat.setAttribute('width','12'); pat.setAttribute('height','12');
    pat.setAttribute('patternTransform','rotate(45)');
    pat.innerHTML = `<rect width="12" height="12" fill="${hex}"/>
      <rect width="6" height="12" fill="rgba(255,255,255,.38)"/>`;
  } else if(patType==='polka'){
    pat.setAttribute('width','20'); pat.setAttribute('height','20');
    pat.removeAttribute('patternTransform');
    pat.innerHTML = `<rect width="20" height="20" fill="${hex}"/>
      <circle cx="10" cy="10" r="6" fill="rgba(255,255,255,.42)"/>`;
  }
  return `url(#${patId})`;
}

function applyFill(elId, hex, patType){
  const el = document.getElementById(elId);
  if(!el) return;
  if(patType==='striped'||patType==='polka'){
    el.setAttribute('fill', buildSVGPattern('svgpat-'+elId, hex, patType));
  } else if(patType==='floral'){
    el.setAttribute('fill', lighten(hex));
  } else {
    el.setAttribute('fill', hex);
  }
}

function updatePatternOverlays(slotId, patId, hex){
  const ov = document.getElementById('pat-overlays');
  [...ov.children].filter(el=>el.dataset.slot===slotId).forEach(el=>el.remove());
  if(patId!=='sparkly' && patId!=='floral') return;
  const emoji = patId==='sparkly' ? '✨' : '🌸';
  const positions = OVERLAY_POS[slotId] || [];
  positions.forEach(([x,y])=>{
    const t = document.createElementNS(NS,'text');
    t.setAttribute('x',x); t.setAttribute('y',y);
    t.setAttribute('font-size','44'); t.setAttribute('text-anchor','middle');
    t.dataset.slot = slotId;
    t.textContent = emoji;
    t.style.pointerEvents='none';
    ov.appendChild(t);
  });
}

function updateFaceOverlay(){
  const fo = document.getElementById('face-overlay');
  fo.innerHTML='';
  const item = slots.face.item;
  const colorHex = slots.face.color?.hex || '#FFB3C6';
  // Reset blush to invisible (PNG already has natural blush painted)
  document.getElementById('blush-l').setAttribute('opacity','0');
  document.getElementById('blush-r').setAttribute('opacity','0');
  // Reset mouth to invisible (PNG has its own mouth)
  document.getElementById('svg-mouth').setAttribute('stroke','none');
  if(!item||item.id==='f1') return;

  if(item.id==='f2'){ // Rosy Cheeks — light overlay on top of PNG's natural blush
    document.getElementById('blush-l').setAttribute('fill',colorHex);
    document.getElementById('blush-l').setAttribute('opacity','0.55');
    document.getElementById('blush-r').setAttribute('fill',colorHex);
    document.getElementById('blush-r').setAttribute('opacity','0.55');
  }
  if(item.id==='f3'){ // Freckles — 992×992 face coords
    [[445,244],[486,233],[544,244],[460,265],[532,265]].forEach(([x,y])=>{
      const c=document.createElementNS(NS,'circle');
      c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r','9');
      c.setAttribute('fill','#C4956A');c.setAttribute('opacity','0.55');
      fo.appendChild(c);
    });
  }
  if(item.id==='f4'){ // Lip Gloss — 992×992 mouth path
    const p=document.createElementNS(NS,'path');
    p.setAttribute('d','M436,278 Q496,318 556,278 Q552,302 496,318 Q440,302 436,278Z');
    p.setAttribute('fill',colorHex); p.setAttribute('opacity','0.8');
    fo.appendChild(p);
  }
  if(item.id==='f5'){ // Bright Eyes — sparkle overlays near eyes (992×992)
    [[406,140],[586,140]].forEach(([x,y])=>{
      const t=document.createElementNS(NS,'text');
      t.setAttribute('x',x);t.setAttribute('y',y);
      t.setAttribute('font-size','38');t.setAttribute('text-anchor','middle');
      t.textContent='✨'; fo.appendChild(t);
    });
  }
}

function updateDoll(){
  // Hair — bald by default, show only when an item is selected
  const hairImgEl = document.getElementById('hair-overlay-img');
  if(slots.hair.item){
    if(slots.hair.item.hairStyle){
      // PNG-based hair: resolve color variant, show overlay <img>, hide SVG hair shapes
      const src = getHairImgSrc(slots.hair.item.hairStyle, slots.hair.color?.name);
      if(hairImgEl){ hairImgEl.src = src; hairImgEl.style.display='block';
        hairImgEl.style.top = slots.hair.item.hairStyle === 'bob' ? '7.9%' : '5%';
        hairImgEl.style.width = slots.hair.item.hairStyle === 'bob' ? '32%' : '31%'; }
      document.getElementById('svg-hair-back').style.display = 'none';
      const hf = document.getElementById('svg-hair-front');
      if(hf) hf.style.display = 'none';
      updatePatternOverlays('hair', 'plain', '');
    } else {
      // SVG-based hair
      if(hairImgEl) hairImgEl.style.display = 'none';
      const hHex = slots.hair.color?.hex || '#8B6356';
      const hPat = slots.hair.pattern?.id || 'plain';
      document.getElementById('svg-hair-back').style.display = '';
      applyFill('svg-hair-back', hHex, hPat);
      const hf = document.getElementById('svg-hair-front');
      if(hf){ hf.style.display=''; hf.setAttribute('fill', hPat==='floral'?lighten(hHex):hHex); }
      updatePatternOverlays('hair', hPat, hHex);
    }
  } else {
    if(hairImgEl) hairImgEl.style.display = 'none';
    document.getElementById('svg-hair-back').style.display = 'none';
    const hf = document.getElementById('svg-hair-front');
    if(hf) hf.style.display = 'none';
    updatePatternOverlays('hair', 'plain', '');
  }

  // Clothing
  if(slots.dress.item){
    document.getElementById('svg-dress').style.display='';
    document.getElementById('svg-top').setAttribute('fill','transparent');
    document.getElementById('svg-bottom').setAttribute('fill','transparent');
    const dHex = slots.dress.color?.hex||'#E8D5E8';
    const dPat = slots.dress.pattern?.id||'plain';
    applyFill('svg-dress-top', dHex, dPat);
    applyFill('svg-dress-bot', dHex, dPat);
    updatePatternOverlays('dress', dPat, dHex);
    clearOverlay('top'); clearOverlay('bottom');
  } else {
    document.getElementById('svg-dress').style.display='none';
    document.getElementById('pat-overlays').querySelectorAll('[data-slot="dress"]').forEach(e=>e.remove());
    if(slots.top.item){
      const tHex = slots.top.color?.hex||'#E8E8E8';
      const tPat = slots.top.pattern?.id||'plain';
      applyFill('svg-top', tHex, tPat);
      updatePatternOverlays('top', tPat, tHex);
    } else {
      document.getElementById('svg-top').setAttribute('fill','transparent');
      clearOverlay('top');
    }
    if(slots.bottom.item){
      const bHex = slots.bottom.color?.hex||'#D8D8D8';
      const bPat = slots.bottom.pattern?.id||'plain';
      applyFill('svg-bottom', bHex, bPat);
      updatePatternOverlays('bottom', bPat, bHex);
    } else {
      document.getElementById('svg-bottom').setAttribute('fill','transparent');
      clearOverlay('bottom');
    }
  }

  // Shoes — transparent when no shoe item selected
  if(slots.shoes.item){
    const sHex = slots.shoes.color?.hex||'#D0D0D0';
    const sPat = slots.shoes.pattern?.id||'plain';
    applyFill('svg-shoe-l', sHex, sPat);
    applyFill('svg-shoe-r', sHex, sPat);
    updatePatternOverlays('shoes', sPat, sHex);
  } else {
    document.getElementById('svg-shoe-l').setAttribute('fill','transparent');
    document.getElementById('svg-shoe-r').setAttribute('fill','transparent');
    clearOverlay('shoes');
  }

  // Accessories
  updateAccessory();
  // Face
  updateFaceOverlay();
}

function clearOverlay(slotId){
  document.getElementById('pat-overlays').querySelectorAll(`[data-slot="${slotId}"]`).forEach(e=>e.remove());
}

function updateAccessory(){
  ['acc-necklace','acc-bag','acc-crown','acc-hat','acc-glasses','acc-ear-l','acc-ear-r']
    .forEach(id=>{ const e=document.getElementById(id); if(e) e.style.display='none'; });
  const acc = slots.accessory.item;
  if(!acc) return;
  function sh(id,emoji){ const e=document.getElementById(id); if(e){e.textContent=emoji;e.style.display='';} }
  switch(acc.pos){
    case 'hat':      sh('acc-hat',acc.emoji); break;
    case 'bag':      sh('acc-bag',acc.emoji); break;
    case 'glasses':  sh('acc-glasses',acc.emoji); break;
    case 'necklace': sh('acc-necklace',acc.emoji); break;
    case 'earrings': sh('acc-ear-l',acc.emoji); sh('acc-ear-r',acc.emoji); break;
  }
}

/* ── SPARKLES ────────────────────────────────────────── */
const SPARKS=['✨','⭐','💫','🌟','💖','🎀'];
function triggerSparkle(){
  const box=document.getElementById('sparkle-box');
  for(let i=0;i<9;i++){
    const s=document.createElement('div');
    s.className='spark';
    s.textContent=SPARKS[Math.floor(Math.random()*SPARKS.length)];
    const angle=(i/9)*360+Math.random()*20;
    const dist=55+Math.random()*55;
    s.style.cssText=`position:absolute;left:50%;top:40%;pointer-events:none;z-index:10;
      font-size:${14+Math.random()*14}px;
      animation:sparkFly ${.7+Math.random()*.4}s ease-out forwards;
      --dx:${Math.cos(angle*Math.PI/180)*dist}px;
      --dy:${Math.sin(angle*Math.PI/180)*dist}px;
      --rot:${Math.random()*360}deg;
      animation-delay:${i*40}ms;`;
    box.appendChild(s);
    setTimeout(()=>s.remove(),1200+i*40);
  }
}

/* ── WHAT IS SHE WEARING ─────────────────────────────── */
function readOutfit(){
  const parts=[];
  const dressSlot = slots.dress.item ? slots.dress : null;
  const topSlot   = slots.top.item   ? slots.top   : null;
  const botSlot   = slots.bottom.item? slots.bottom : null;

  if(dressSlot){
    const p=dressSlot.pattern?.id!=='plain'?dressSlot.pattern.name+' ':'';
    parts.push(`a ${p}${dressSlot.color.name} ${dressSlot.item.noun}`);
  } else {
    if(topSlot){
      const p=topSlot.pattern?.id!=='plain'?topSlot.pattern.name+' ':'';
      parts.push(`a ${p}${topSlot.color.name} ${topSlot.item.noun}`);
    }
    if(botSlot){
      const p=botSlot.pattern?.id!=='plain'?botSlot.pattern.name+' ':'';
      parts.push(`${p}${botSlot.color.name} ${botSlot.item.noun}`);
    }
  }
  if(slots.shoes.item){
    const p=slots.shoes.pattern?.id!=='plain'?slots.shoes.pattern.name+' ':'';
    parts.push(`${p}${slots.shoes.color.name} ${slots.shoes.item.noun}`);
  }
  if(slots.hair.item){
    parts.push(`her hair is in a ${slots.hair.color.name} ${slots.hair.item.noun}`);
  }
  if(slots.accessory.item) parts.push(`a ${slots.accessory.item.noun}`);

  if(!parts.length){ speak("She's not dressed yet! Pick some clothes!"); return; }
  speak(`She is wearing ${parts.join(', and ')}.`, .95, 1.1);
}

/* ── CHALLENGE ───────────────────────────────────────── */
const CHALLENGES=[
  'Can you find something red? ❤️','Can you find something sparkly? ✨',
  'Can you find something blue? 💙','Can you find something with polka dots? 🔵',
  'Can you find something golden? ✨','Can you find something green? 💚',
  'Can you find the tall shoes? 👠','Can you find something pink? 🩷',
  'Can you find something purple? 💜','Can you find something striped? 〰️',
];
function showChallenge(){
  const ch=CHALLENGES[Math.floor(Math.random()*CHALLENGES.length)];
  document.getElementById('challenge-text').textContent=ch;
  document.getElementById('challenge-pop').style.display='block';
  document.getElementById('pop-overlay').style.display='block';
  document.getElementById('challenge-pop').style.animation='popIn .3s cubic-bezier(.34,1.56,.64,1) forwards';
  speak(ch,.95,1.1);
}
function closeChallenge(){
  document.getElementById('challenge-pop').style.display='none';
  document.getElementById('pop-overlay').style.display='none';
}

/* ── PHASE 2 MAD-LIBS ────────────────────────────────── */
const COLOR_POOL = COLORS.map(c=>c.name.toLowerCase());
const NOUN_POOL  = ['t-shirt','tank top','hoodie','sweater','crop top','jeans','skirt','shorts','leggings','short dress','long dress','gown','party dress'];
const HAIR_POOL  = ['ponytail','braids','curly hair','straight hair','bun','pigtails','pixie cut','bob'];

function pickDistractors(answer, pool, n=2){
  return pool.filter(x=>x!==answer).sort(()=>Math.random()-.5).slice(0,n);
}
function shuffled(arr){ return [...arr].sort(()=>Math.random()-.5); }

function buildP2Blanks(){
  const cSlot = slots.dress.item ? slots.dress : slots.top;
  const colAns  = (cSlot.color?.name||'pink').toLowerCase();
  const typeAns = cSlot.item?.noun||'dress';
  const shoeAns = (slots.shoes.color?.name||'white').toLowerCase();
  const hairAns = slots.hair.item?.noun||'ponytail';

  return [
    {prompt:'What color is her outfit?',
     answer:colAns, options:shuffled([colAns,...pickDistractors(colAns,COLOR_POOL)]),
     filled:null, creative:false, pre:'My doll is wearing a beautiful ', suf:' '},
    {prompt:'What is she wearing?',
     answer:typeAns, options:shuffled([typeAns,...pickDistractors(typeAns,NOUN_POOL)]),
     filled:null, creative:false, pre:'', suf:'.'},
    {prompt:'What color are her shoes?',
     answer:shoeAns, options:shuffled([shoeAns,...pickDistractors(shoeAns,COLOR_POOL)]),
     filled:null, creative:false, pre:'\nShe has ', suf:' shoes.'},
    {prompt:"What style is her hair?",
     answer:hairAns, options:shuffled([hairAns,...pickDistractors(hairAns,HAIR_POOL)]),
     filled:null, creative:false, pre:'\nHer hair is in a ', suf:'.'},
    {prompt:'Where is she going tonight? You choose!',
     answer:null, options:shuffled(['a party 🎉','school 📚','a runway show 🌟']),
     filled:null, creative:true, pre:'\nTonight she is going to ', suf:'!'},
  ];
}

function lightenHex(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},.18)`;
}

function renderP2Story(){
  let html='';
  p2Blanks.forEach((b,i)=>{
    html += escH(b.pre.replace(/\n/g,'<br>'));
    const cls = b.filled ? 's-blank done' : (i===p2CurrentIdx ? 's-blank active' : 's-blank');
    html += `<span class="${cls}" id="sb-${i}">${b.filled ? escH(b.filled) : '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;'}</span>`;
    html += escH(b.suf);
  });
  return html;
}
function escH(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderP2Choices(idx){
  const b=p2Blanks[idx];
  document.getElementById('p2-prompt').textContent=b.prompt;
  document.getElementById('p2-choices').innerHTML=b.options.map(opt=>`
    <button class="choice-btn" onclick="handleChoice(${idx},'${opt.replace(/'/g,"\\'")}')">${opt}</button>`).join('');
}

function startPhase2(){
  cancelSpeech();
  p2Blanks = buildP2Blanks();
  p2CurrentIdx = 0;

  // Outfit chips
  const chips=[];
  const cSlot=slots.dress.item?slots.dress:slots.top;
  if(cSlot.item) chips.push({label:`${cSlot.item.emoji} ${cSlot.color.name} ${cSlot.item.label}`,hex:cSlot.color.hex});
  if(slots.bottom.item&&!slots.dress.item) chips.push({label:`${slots.bottom.item.emoji} ${slots.bottom.color.name} ${slots.bottom.item.label}`,hex:slots.bottom.color.hex});
  if(slots.shoes.item)  chips.push({label:`${slots.shoes.item.emoji} ${slots.shoes.color.name} ${slots.shoes.item.label}`, hex:slots.shoes.color.hex});
  if(slots.hair.item)   chips.push({label:`💇 ${slots.hair.color.name} ${slots.hair.item.label}`, hex:slots.hair.color.hex});
  if(slots.accessory.item) chips.push({label:`${slots.accessory.item.emoji} ${slots.accessory.item.label}`, hex:slots.accessory.color.hex});
  document.getElementById('p2-chips').innerHTML = chips.map(c=>`
    <span class="p2-chip" style="background:${lightenHex(c.hex)};border-color:${c.hex}50">${c.label}</span>`).join('');

  document.getElementById('p2-story').innerHTML = renderP2Story();
  renderP2Choices(0);
  document.getElementById('p2-cheer').style.display='none';
  document.getElementById('p2-done').style.display='none';
  document.getElementById('p2-choices').style.display='flex';
  document.getElementById('p2-prompt').style.display='block';
  const p2=document.getElementById('phase2');
  p2.style.display='flex';
  p2.style.animation='slideUp .5s cubic-bezier(.34,1.36,.64,1) forwards';
  setTimeout(()=>speak("Now tell me about your look! Tap the right word!",.95,1.1),400);
}

function handleChoice(idx, value){
  const b=p2Blanks[idx];
  if(b.filled) return;
  const val=value.toLowerCase();
  const isCorrect=b.creative||(val===b.answer)||val.includes(b.answer)||b.answer.includes(val.replace(/ 🎉| 📚| 🌟/g,'').trim());
  const btns=document.querySelectorAll('.choice-btn');

  if(isCorrect){
    btns.forEach(btn=>{ if(btn.textContent.trim()===value) btn.classList.add('correct'); });
    b.filled=value.replace(/ 🎉| 📚| 🌟/g,'').trim();
    setTimeout(()=>{
      document.getElementById('p2-story').innerHTML=renderP2Story();
      let next=-1;
      for(let i=0;i<p2Blanks.length;i++) if(!p2Blanks[i].filled){next=i;break;}
      if(next===-1){ allP2Done(); }
      else { p2CurrentIdx=next; renderP2Choices(next); speak('Great job! Keep going!',1,1.15); }
    },420);
  } else {
    btns.forEach(btn=>btn.classList.add('wrong'));
    setTimeout(()=>btns.forEach(btn=>btn.classList.remove('wrong')),440);
    speak("Hmm, try again!",1,1.1);
  }
}

function allP2Done(){
  document.getElementById('p2-choices').style.display='none';
  document.getElementById('p2-prompt').style.display='none';
  const ch=document.getElementById('p2-cheer');
  ch.textContent='🎉 Amazing! You did it! 🌟';
  ch.style.display='block';
  document.getElementById('p2-done').style.display='flex';
  speak("Amazing! You did it! Now listen to your story!",1,1.15);
}

function readStory(){
  const text=p2Blanks.map(b=>(b.pre+(b.filled||'')+b.suf).replace(/\n/g,' ')).join(' ').replace(/\s+/g,' ').trim();
  speak(text,.9,1.1);
}

function endPhase2(){
  cancelSpeech();
  const p2=document.getElementById('phase2');
  p2.style.animation='none';
  p2.style.display='none';
}

/* ── INIT ────────────────────────────────────────────── */
renderCategories();
renderAll();
updateDoll();

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeChallenge(); });
</script>

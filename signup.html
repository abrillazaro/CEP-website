<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create your account · CEP</title>
<link rel="icon" href="logo-navy.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #20395c;
    --navy-deep: #152840;
    --sage: #5d7c69;
    --sage-tint: #dce7dd;
    --bg: #f1f3ef;
    --surface: #ffffff;
    --line: #e4e7df;
    --line-strong: #cdd4c9;
    --ink: #1e2a3a;
    --muted: #6c7787;
    --rose: #b4574a;
    --sans: "Hanken Grotesk", system-ui, sans-serif;
    --serif: "Playfair Display", Georgia, serif;
    --shadow-lg: 0 8px 40px rgba(32, 57, 92, .13);
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: var(--surface);
    border-radius: 22px;
    padding: 52px 48px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--line);
  }

  .logo {
    height: 40px;
    display: block;
    margin-bottom: 28px;
  }

  h1 {
    font-family: var(--serif);
    font-size: 28px;
    color: var(--navy);
    font-weight: 600;
    margin-bottom: 6px;
  }

  .sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .field {
    margin-bottom: 18px;
  }

  .field label {
    display: block;
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 7px;
  }

  .field input {
    width: 100%;
    border: 1.5px solid var(--line-strong);
    border-radius: 11px;
    padding: 13px 15px;
    font-size: 15px;
    font-family: var(--sans);
    color: var(--ink);
    background: var(--surface);
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }

  .field input:focus {
    border-color: var(--navy);
    box-shadow: 0 0 0 3px rgba(32, 57, 92, .08);
  }

  .field input::placeholder {
    color: #b0b8c4;
  }

  .hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 5px;
  }

  .err {
    font-size: 13px;
    color: var(--rose);
    background: rgba(180, 87, 74, .07);
    border-radius: 9px;
    padding: 10px 14px;
    margin-bottom: 18px;
    display: none;
  }
  .err.show { display: block; }

  .btn-primary {
    width: 100%;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 15px;
    font-weight: 700;
    font-family: var(--sans);
    cursor: pointer;
    transition: background .15s, transform .1s;
    margin-top: 6px;
    letter-spacing: .01em;
  }

  .btn-primary:hover:not(:disabled) {
    background: var(--navy-deep);
    transform: translateY(-1px);
  }

  .btn-primary:disabled {
    opacity: .55;
    cursor: not-allowed;
  }

  /* Success state */
  .success-state {
    display: none;
    text-align: center;
    padding: 12px 0;
  }

  .success-state .check {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--sage-tint);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }

  .success-state .check svg {
    color: var(--sage);
  }

  .success-state h2 {
    font-family: var(--serif);
    font-size: 24px;
    color: var(--navy);
    margin-bottom: 10px;
  }

  .success-state p {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
  }

  .success-state .email-highlight {
    font-weight: 600;
    color: var(--ink);
  }

  @media (max-width: 480px) {
    .card { padding: 36px 24px; }
    h1 { font-size: 24px; }
  }
</style>
</head>
<body>
<div class="card">

  <!-- Signup form -->
  <div id="formState">
    <img class="logo" src="logo-navy.png" alt="The Corporate English Project" />
    <h1>Create your account</h1>
    <p class="sub">Join CEP and start your English learning journey.</p>

    <div class="err" id="errBox"></div>

    <form id="signupForm">
      <div class="field">
        <label for="fullname">Full name</label>
        <input type="text" id="fullname" placeholder="Your full name" required autocomplete="name" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="new-password" minlength="8" />
        <p class="hint">At least 8 characters.</p>
      </div>
      <button class="btn-primary" type="submit" id="submitBtn">Create account</button>
    </form>
  </div>

  <!-- Success state -->
  <div class="success-state" id="successState">
    <div class="check">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h2>Check your email</h2>
    <p>We sent a confirmation link to <span class="email-highlight" id="confirmedEmail"></span>. Click it to activate your account and go to your dashboard.</p>
  </div>

</div>

<script>
const SUPABASE_URL  = 'https://qkxhzpicqjxodeadhcvw.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFreGh6cGljcWp4b2RlYWRoY3Z3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNTg2NTUsImV4cCI6MjA5MjgzNDY1NX0.wLL0h9vQ8W5xp7mKFbq-CphiqE4cRVGTQ-KayuteHt8';

const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const CONFIRM_URL = new URL('confirm.html', window.location.href);
CONFIRM_URL.searchParams.set('next', 'dashboard.html');

const form      = document.getElementById('signupForm');
const submitBtn = document.getElementById('submitBtn');
const errBox    = document.getElementById('errBox');

function showErr(msg) {
  errBox.textContent = msg;
  errBox.classList.add('show');
}

function clearErr() {
  errBox.textContent = '';
  errBox.classList.remove('show');
}

form.addEventListener('submit', async function(e) {
  e.preventDefault();
  clearErr();

  const fullname = document.getElementById('fullname').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  submitBtn.disabled    = true;
  submitBtn.textContent = 'Creating account…';

  const { error } = await _sb.auth.signUp({
    email,
    password,
    options: {
      emailRedirectTo: CONFIRM_URL.toString(),
      data: { full_name: fullname }
    }
  });

  if (error) {
    showErr(error.message);
    submitBtn.disabled    = false;
    submitBtn.textContent = 'Create account';
    return;
  }

  document.getElementById('confirmedEmail').textContent = email;
  document.getElementById('formState').style.display   = 'none';
  document.getElementById('successState').style.display = 'block';
});
</script>
</body>
</html>

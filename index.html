<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Corporate English Project — Translate</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy:#20395c;
    --navy-deep:#152840;
    --navy-soft:#54688a;
    --sage:#5d7c69;
    --sage-deep:#465c4f;
    --sage-tint:#dce7dd;
    --bg:#f1f3ef;
    --bg-2:#eaeee8;
    --surface:#ffffff;
    --surface-soft:#f8faf6;
    --line:#e0e4dd;
    --line-strong:#cdd4c9;
    --ink:#1e2a3a;
    --muted:#6c7787;
    --serif:"Playfair Display", Georgia, serif;
    --sans:"Hanken Grotesk", system-ui, sans-serif;
    --shadow-sm:0 1px 2px rgba(21,40,64,.05), 0 1px 3px rgba(21,40,64,.06);
    --shadow-md:0 6px 16px rgba(21,40,64,.08), 0 2px 6px rgba(21,40,64,.05);
    --shadow-lg:0 22px 50px -12px rgba(21,40,64,.22), 0 8px 20px rgba(21,40,64,.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh;}
  #root{min-height:100vh;}
  ::selection{background:var(--sage-tint);color:var(--navy-deep);}
  button{font-family:inherit;cursor:pointer;}
  input{font-family:inherit;}
  @keyframes riseIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes glowPulse{0%,100%{opacity:.85;transform:scale(1);}50%{opacity:1;transform:scale(1.04);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes barWave{0%,100%{transform:scaleY(.35);}50%{transform:scaleY(1);}}

  /* Layout */
  .page{position:relative;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
  .glow{position:fixed;left:50%;top:42%;width:min(1100px,120vw);height:min(1100px,120vw);
    transform:translate(-50%,-50%);border-radius:50%;pointer-events:none;z-index:0;
    filter:blur(8px);transition:opacity .6s ease,background .4s ease;}
  .glow.animate{animation:glowPulse 9s ease-in-out infinite;}
  .shell{position:relative;z-index:2;width:100%;max-width:1180px;margin:0 auto;padding:0 40px;}

  /* Nav */
  .nav{position:relative;z-index:5;display:flex;align-items:center;justify-content:space-between;
    padding:22px 40px;max-width:1320px;margin:0 auto;width:100%;}
  .nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--navy);}
  .nav-logo img{height:60px;width:auto;display:block;}
  .nav-right{display:flex;align-items:center;gap:10px;}
  .lang-toggle{display:flex;align-items:center;gap:7px;border:1px solid var(--line-strong);
    background:var(--surface);border-radius:999px;padding:7px 13px;font-size:14px;font-weight:600;
    color:var(--navy);box-shadow:var(--shadow-sm);}
  .nav-link{padding:9px 14px;border-radius:10px;color:var(--navy);text-decoration:none;
    font-weight:600;font-size:15px;background:transparent;border:none;transition:background .15s;}
  .nav-link:hover{background:rgba(32,57,92,.07);}
  .btn-login{background:var(--navy);color:#fff;border:none;border-radius:11px;padding:11px 22px;
    font-weight:700;font-size:15px;white-space:nowrap;box-shadow:var(--shadow-sm);
    transition:transform .12s,background .2s;}
  .btn-login:hover{background:var(--navy-deep);transform:translateY(-1px);}

  /* Hero */
  .hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    padding-top:min(13vh,130px);padding-bottom:80px;text-align:center;}
  .hero.compact{padding-top:48px;}
  .eyebrow{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--sage-deep);
    font-weight:700;margin:0 0 18px;}
  .headline{font-family:var(--serif);font-weight:600;color:var(--navy);letter-spacing:-.01em;
    font-size:clamp(38px,6vw,68px);line-height:1.04;margin:0;transition:all .5s ease;}
  .headline em{font-style:italic;color:var(--sage-deep);}
  .subhead{font-family:var(--serif);font-style:italic;color:var(--navy-soft);
    font-size:clamp(17px,2vw,23px);margin:18px 0 0;font-weight:400;}
  .hero-fold{overflow:hidden;transition:max-height .55s ease,opacity .4s ease,margin .45s ease;
    max-height:320px;opacity:1;}
  .hero-fold.hidden{max-height:0;opacity:0;margin-bottom:0;}

  /* Search bar */
  .searchwrap{width:100%;max-width:820px;margin:38px auto 0;}
  .searchbar{display:flex;align-items:center;gap:14px;background:var(--surface);
    border:1.5px solid var(--line-strong);border-radius:999px;padding:6px 8px 6px 24px;
    box-shadow:var(--shadow-md);transition:border-color .2s,box-shadow .2s;}
  .searchbar:focus-within{border-color:var(--sage);
    box-shadow:0 0 0 4px rgba(93,124,105,.16),var(--shadow-lg);}
  .searchbar .ico{color:var(--navy-soft);flex-shrink:0;display:flex;}
  .searchbar input{flex:1;border:none;outline:none;background:transparent;font-size:20px;
    color:var(--ink);padding:16px 0;min-width:0;}
  .searchbar input::placeholder{color:#9aa3ad;font-family:var(--serif);font-size:19px;}
  .icon-btn{border:none;background:transparent;color:var(--navy-soft);border-radius:50%;
    width:44px;height:44px;display:flex;align-items:center;justify-content:center;
    transition:background .15s,color .15s;flex-shrink:0;}
  .icon-btn:hover{background:rgba(32,57,92,.07);color:var(--navy);}
  .icon-btn.mic.live{color:#fff;background:var(--sage);}
  .btn-go{border:none;background:var(--navy);color:#fff;border-radius:999px;height:50px;
    padding:0 26px;font-weight:700;font-size:16px;display:flex;align-items:center;gap:8px;
    transition:background .2s,transform .12s;flex-shrink:0;}
  .btn-go:hover{background:var(--navy-deep);transform:translateY(-1px);}
  .btn-go:disabled{opacity:.45;cursor:default;transform:none;}
  .dir-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:16px;}
  .dir-chip{display:inline-flex;align-items:center;gap:9px;background:var(--surface);
    white-space:nowrap;border:1px solid var(--line);border-radius:999px;padding:7px 14px;
    font-size:13.5px;font-weight:600;color:var(--navy);box-shadow:var(--shadow-sm);
    transition:border-color .15s;}
  .dir-chip:hover{border-color:var(--sage);}
  .dir-chip .swap{color:var(--sage-deep);display:flex;}
  .hint{font-size:13px;color:var(--muted);}

  /* Result card */
  .result{width:100%;max-width:820px;margin:30px auto 0;text-align:left;
    animation:riseIn .5s ease both;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:22px;
    box-shadow:var(--shadow-lg);overflow:hidden;}
  .card-head{display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:18px 26px;border-bottom:1px solid var(--line);background:var(--surface-soft);
    flex-wrap:wrap;}
  .src-echo{font-size:15px;color:var(--muted);}
  .src-echo b{color:var(--navy);font-weight:600;}
  .pill{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    padding:5px 10px;border-radius:999px;background:var(--sage-tint);color:var(--sage-deep);}
  .pill.free{background:#e4ede4;color:var(--sage-deep);}
  .pill.pro{background:var(--navy);color:#fff;}
  .card-body{padding:26px;}
  .trans-row{display:flex;align-items:flex-start;gap:16px;}
  .trans{font-family:var(--serif);font-weight:600;color:var(--navy);
    font-size:clamp(30px,4.4vw,44px);line-height:1.12;letter-spacing:-.01em;}
  .pos{font-style:italic;color:var(--muted);font-size:16px;font-family:var(--serif);margin-top:4px;}
  .phon{font-size:16px;color:var(--navy-soft);margin-top:8px;font-variant:all-small-caps;
    letter-spacing:.02em;}
  .speak{margin-top:6px;border:1px solid var(--line-strong);background:var(--surface);
    color:var(--navy);border-radius:999px;padding:8px 14px;font-size:13.5px;font-weight:600;
    display:inline-flex;align-items:center;gap:8px;transition:background .15s,border-color .15s;}
  .speak:hover{background:var(--surface-soft);border-color:var(--sage);}
  .speak.playing{color:var(--sage-deep);border-color:var(--sage);}
  .eqbars{display:inline-flex;align-items:flex-end;gap:2px;height:14px;}
  .eqbars span{width:3px;height:14px;background:var(--sage);border-radius:2px;transform-origin:bottom;}
  .speak.playing .eqbars span{animation:barWave .8s ease-in-out infinite;}
  .speak.playing .eqbars span:nth-child(2){animation-delay:.15s;}
  .speak.playing .eqbars span:nth-child(3){animation-delay:.3s;}
  .sec-label{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:26px 0 12px;}
  .ex{padding:14px 0;border-top:1px solid var(--line);}
  .ex:first-of-type{border-top:none;}
  .ex .es{font-size:17px;color:var(--ink);}
  .ex .en{font-size:15px;color:var(--muted);margin-top:3px;}

  /* Gate */
  .gate{margin:8px 26px 26px;border:1px dashed var(--line-strong);border-radius:18px;
    background:linear-gradient(180deg,var(--surface-soft),#fff);padding:22px 24px;}
  .gate-head{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
  .gate-title{font-family:var(--serif);font-weight:600;color:var(--navy);font-size:22px;}
  .gate-sub{color:var(--muted);font-size:14.5px;margin:0 0 18px;}
  .locked-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .locked{position:relative;border:1px solid var(--line);border-radius:14px;background:#fff;
    padding:16px 18px;overflow:hidden;cursor:pointer;
    transition:border-color .18s,transform .12s,box-shadow .2s;}
  .locked:hover{border-color:var(--sage);transform:translateY(-2px);box-shadow:var(--shadow-md);}
  .locked h4{margin:0 0 6px;font-size:15px;color:var(--navy);display:flex;align-items:center;gap:8px;}
  .locked .blurpv{filter:blur(4.5px);opacity:.55;user-select:none;font-size:14px;color:var(--ink);
    line-height:1.5;}
  .locked .lockcta{position:absolute;left:0;right:0;bottom:0;display:flex;align-items:center;
    justify-content:center;gap:7px;padding:10px;font-size:13px;font-weight:700;color:var(--navy);
    background:linear-gradient(180deg,rgba(255,255,255,0),rgba(255,255,255,.96) 55%);}
  .gate-actions{display:flex;align-items:center;gap:12px;margin-top:18px;flex-wrap:wrap;}
  .btn-save{display:inline-flex;align-items:center;gap:9px;border:1.5px solid var(--navy);
    background:transparent;color:var(--navy);border-radius:12px;padding:12px 20px;font-weight:700;
    font-size:15px;transition:background .15s,color .15s;}
  .btn-save:hover{background:var(--navy);color:#fff;}
  .btn-pro{display:inline-flex;align-items:center;gap:9px;border:none;background:var(--sage);
    color:#fff;border-radius:12px;padding:12px 20px;font-weight:700;font-size:15px;
    transition:background .2s,transform .12s;}
  .btn-pro:hover{background:var(--sage-deep);transform:translateY(-1px);}

  /* Loading / error */
  .loading{display:flex;align-items:center;gap:12px;justify-content:center;
    color:var(--navy-soft);font-size:16px;margin:34px 0;}
  .spinner{width:20px;height:20px;border:2.5px solid var(--line-strong);
    border-top-color:var(--sage);border-radius:50%;animation:spin .8s linear infinite;}
  .errbox{max-width:820px;margin:24px auto 0;background:#fff;border:1px solid var(--line);
    border-left:3px solid #c0563f;border-radius:12px;padding:16px 20px;color:var(--ink);
    font-size:15px;}

  /* Quick chips */
  .quickrow{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:22px;
    flex-wrap:wrap;}
  .qchip{border:1px solid var(--line);background:var(--surface);border-radius:999px;
    white-space:nowrap;padding:8px 15px;font-size:14px;color:var(--navy);font-weight:500;
    transition:all .15s;box-shadow:var(--shadow-sm);}
  .qchip:hover{border-color:var(--sage);color:var(--sage-deep);transform:translateY(-1px);}

  /* Modal */
  .overlay{position:fixed;inset:0;z-index:50;background:rgba(21,40,64,.34);
    backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;
    padding:24px;animation:fadeIn .2s ease;}
  .modal{width:100%;max-width:420px;background:#fff;border-radius:22px;
    box-shadow:var(--shadow-lg);padding:34px 32px;animation:riseIn .3s ease both;position:relative;}
  .modal .x{position:absolute;top:16px;right:16px;border:none;background:transparent;
    color:var(--muted);width:34px;height:34px;border-radius:50%;display:flex;
    align-items:center;justify-content:center;}
  .modal .x:hover{background:var(--surface-soft);color:var(--navy);}
  .modal .mlogo{height:46px;margin-bottom:14px;}
  .modal h2{font-family:var(--serif);font-size:25px;color:var(--navy);margin:0 0 6px;
    font-weight:600;}
  .modal p.lead{color:var(--muted);font-size:14.5px;margin:0 0 22px;line-height:1.5;}
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:6px;}
  .field input{width:100%;border:1.5px solid var(--line-strong);border-radius:11px;
    padding:12px 14px;font-size:15px;color:var(--ink);outline:none;
    transition:border-color .15s,box-shadow .15s;}
  .field input:focus{border-color:var(--sage);box-shadow:0 0 0 3px rgba(93,124,105,.15);}
  .btn-primary{width:100%;background:var(--navy);color:#fff;border:none;border-radius:12px;
    padding:14px;font-weight:700;font-size:15.5px;margin-top:6px;transition:background .2s;}
  .btn-primary:hover{background:var(--navy-deep);}
  .or{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:13px;margin:18px 0;}
  .or::before,.or::after{content:"";flex:1;height:1px;background:var(--line);}
  .btn-google{width:100%;border:1.5px solid var(--line-strong);background:#fff;border-radius:12px;
    padding:12px;font-weight:600;font-size:15px;color:var(--ink);display:flex;
    align-items:center;justify-content:center;gap:10px;transition:background .15s;}
  .btn-google:hover{background:var(--surface-soft);}
  .modal .foot{text-align:center;font-size:13.5px;color:var(--muted);margin:18px 0 0;}
  .modal .foot a{color:var(--navy);font-weight:600;cursor:pointer;text-decoration:none;}
  .modal .reassure{display:flex;align-items:center;gap:7px;justify-content:center;
    font-size:12.5px;color:var(--sage-deep);margin-top:14px;}

  /* Toast */
  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);z-index:60;
    background:var(--navy);color:#fff;padding:13px 22px;border-radius:12px;font-size:14.5px;
    font-weight:600;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;
    animation:riseIn .3s ease both;}

  /* Story sections */
  .section{position:relative;z-index:2;}
  .section.alt{background:var(--bg-2);border-top:1px solid var(--line);}
  .sec-wrap{position:relative;max-width:1080px;margin:0 auto;padding:0 40px;}
  .ethos{padding:104px 0 88px;border-top:1px solid var(--line);}
  .founder{min-height:84vh;display:flex;flex-direction:column;justify-content:center;padding:72px 0;}
  .contact{padding:88px 0 56px;}
  .sec-title{font-family:var(--serif);font-weight:600;color:var(--navy);letter-spacing:-.01em;
    font-size:clamp(40px,6vw,72px);line-height:1;margin:0 0 30px;}
  .sec-rule{width:64px;height:3px;background:var(--sage);border-radius:2px;margin:0 0 30px;}
  .prose{max-width:760px;}
  .prose p{font-size:clamp(17px,1.6vw,20px);line-height:1.72;color:var(--navy-soft);
    margin:0 0 22px;text-wrap:pretty;}
  .prose p:last-child{margin-bottom:0;}
  .watermark{position:absolute;pointer-events:none;opacity:.09;width:300px;height:auto;}

  /* Founder */
  .founder-grid{display:flex;flex-direction:column;gap:28px;max-width:680px;align-items:stretch;}
  .video-ph{position:relative;aspect-ratio:16/9;border-radius:20px;overflow:hidden;
    border:1px solid var(--line-strong);box-shadow:var(--shadow-lg);display:flex;
    flex-direction:column;align-items:center;justify-content:center;gap:16px;cursor:pointer;
    background:repeating-linear-gradient(135deg,#e3ede4,#e3ede4 13px,#edf3ed 13px,#edf3ed 26px);
    transition:transform .2s,box-shadow .2s;}
  .video-ph:hover{transform:translateY(-2px);
    box-shadow:var(--shadow-lg),0 0 0 4px rgba(93,124,105,.14);}
  .video-ph video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .play{width:78px;height:78px;border-radius:50%;background:rgba(255,255,255,.94);display:flex;
    align-items:center;justify-content:center;color:var(--navy);box-shadow:var(--shadow-md);
    transition:transform .2s;}
  .video-ph:hover .play{transform:scale(1.06);}
  .play svg{margin-left:4px;}
  .video-col{display:flex;flex-direction:column;}
  .video-cap{font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:12px;
    letter-spacing:.06em;color:var(--sage-deep);margin-top:13px;text-transform:uppercase;}
  .founder-bio .kicker{font-size:13px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--sage-deep);font-weight:700;margin:0 0 14px;}

  /* Contact */
  .contact-grid{display:grid;
    grid-template-columns:minmax(190px,.78fr) auto minmax(300px,1.32fr);
    gap:44px;align-items:center;}
  .cor-mid{font-family:var(--serif);font-style:italic;color:var(--navy-soft);font-size:23px;
    text-align:center;}
  .qr-col{display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center;}
  .scan{font-family:var(--serif);font-style:italic;color:var(--navy-soft);font-size:19px;
    display:flex;align-items:center;gap:8px;white-space:nowrap;}
  .qr-box{width:222px;height:222px;background:#fff;border-radius:16px;padding:12px;
    box-shadow:var(--shadow-md);border:1px solid var(--line);}
  .qr-box img{width:100%;height:100%;object-fit:contain;display:block;}
  .wa{display:inline-flex;align-items:center;gap:12px;font-family:var(--serif);font-weight:600;
    color:var(--navy);font-size:24px;letter-spacing:.01em;white-space:nowrap;text-decoration:none;}
  .wa .wa-logo{width:40px;height:auto;display:block;flex-shrink:0;}
  .form-head{font-family:var(--serif);font-style:italic;font-weight:600;color:var(--navy);
    font-size:clamp(26px,3vw,36px);line-height:1.1;margin:0 0 4px;}
  .form-sub{font-family:var(--serif);font-style:italic;color:var(--navy-soft);font-size:18px;
    margin:0 0 26px;}
  .cform{display:flex;flex-direction:column;gap:14px;max-width:560px;}
  .cfield input{width:100%;border:1px solid var(--line-strong);
    background:rgba(255,255,255,.55);backdrop-filter:blur(4px);border-radius:13px;
    padding:17px 18px;font-size:16px;color:var(--ink);outline:none;
    transition:border-color .15s,box-shadow .15s,background .15s;}
  .cfield input::placeholder{color:var(--navy-soft);}
  .cfield input:focus{border-color:var(--sage);background:#fff;
    box-shadow:0 0 0 3px rgba(93,124,105,.15);}
  .csubmit{margin-top:6px;background:var(--navy);color:#fff;border:none;border-radius:13px;
    padding:18px;font-weight:700;font-size:16px;transition:background .2s,transform .12s;}
  .csubmit:hover{background:var(--navy-deep);transform:translateY(-1px);}
  .foot-cep{text-align:center;color:var(--muted);font-size:14px;padding:38px 0 8px;
    letter-spacing:.01em;}

  @media (max-width:820px){
    .shell,.nav{padding-left:20px;padding-right:20px;}
    .locked-grid{grid-template-columns:1fr;}
    .founder-grid,.contact-grid{grid-template-columns:1fr;gap:34px;}
    .founder{min-height:0;}
    .watermark{display:none;}
    .sec-wrap{padding-left:22px;padding-right:22px;}
    .ethos,.founder,.contact{padding-top:60px;padding-bottom:54px;}
    .nav-link.hide-sm{display:none;}
    .searchbar input{font-size:18px;}
    .btn-go span.lbl{display:none;}
    .btn-go{padding:0 16px;}
  }
</style>
</head>
<body>

/* ---- Icons ---- */
function Icon({ name, size = 22, stroke = 2 }) {
  const p = { width: size, height: size, viewBox: "0 0 24 24", fill: "none",
    stroke: "currentColor", strokeWidth: stroke, strokeLinecap: "round", strokeLinejoin: "round" };
  switch (name) {
    case "search":   return <svg {...p}><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>;
    case "mic":      return <svg {...p}><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><line x1="12" y1="18" x2="12" y2="21"/></svg>;
    case "swap":     return <svg {...p}><path d="M7 4 3 8l4 4"/><path d="M3 8h14"/><path d="m17 20 4-4-4-4"/><path d="M21 16H7"/></svg>;
    case "globe":    return <svg {...p}><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18Z"/></svg>;
    case "speaker":  return <svg {...p}><path d="M11 5 6 9H3v6h3l5 4V5Z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 6a9 9 0 0 1 0 12"/></svg>;
    case "lock":     return <svg {...p}><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>;
    case "bookmark": return <svg {...p}><path d="M6 4h12v16l-6-4-6 4V4Z"/></svg>;
    case "spark":    return <svg {...p}><path d="M12 2.5 14 9.6 21 12 14 14.4 12 21.5 10 14.4 3 12 10 9.6Z"/></svg>;
    case "chat":     return <svg {...p}><path d="M4 5h16v11H8l-4 4V5Z"/></svg>;
    case "check":    return <svg {...p}><path d="m5 12 4.5 4.5L19 7"/></svg>;
    case "close":    return <svg {...p}><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>;
    case "shield":   return <svg {...p}><path d="M12 3 5 6v5c0 4.5 3 7.5 7 9 4-1.5 7-4.5 7-9V6l-7-3Z"/></svg>;
    case "play":     return <svg {...p} fill="currentColor" stroke="none"><path d="M8 5.5v13l11-6.5z"/></svg>;
    default: return null;
  }
}

/* ---- Translator — LibreTranslate (free, no API key, browser-side) ---- */
const LIBRE_BASE = "https://translate.argosopentech.com";

async function translatePhrase(input, forced) {
  let sourceLang, targetLang;

  if (forced === "en2es") {
    sourceLang = "en"; targetLang = "es";
  } else if (forced === "es2en") {
    sourceLang = "es"; targetLang = "en";
  } else {
    const detRes = await fetch(`${LIBRE_BASE}/detect`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ q: input })
    });
    if (!detRes.ok) throw new Error(`HTTP ${detRes.status}`);
    const detData = await detRes.json();
    const detected = detData[0]?.language || "es";
    sourceLang = detected === "en" ? "en" : "es";
    targetLang = detected === "en" ? "es" : "en";
  }

  const transRes = await fetch(`${LIBRE_BASE}/translate`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ q: input, source: sourceLang, target: targetLang, format: "text" })
  });
  if (!transRes.ok) throw new Error(`HTTP ${transRes.status}`);
  const transData = await transRes.json();

  return {
    input,
    sourceLang,
    targetLang,
    translation: transData.translatedText || "",
    partOfSpeech: "",
    register: "",
    pronunciation: "",
    examples: [],
    idioms: []
  };
}

function speak(text, lang) {
  try {
    if (!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang === "es" ? "es-ES" : "en-US";
    u.rate = 0.92;
    window.speechSynthesis.speak(u);
    return u;
  } catch { /* ignore */ }
}

/* ---- Translation result ---- */
function Result({ t, data, onSave, onPro, onNew }) {
  const [playing, setPlaying] = useState(false);
  const tgt = data.targetLang || "en";
  const src = data.sourceLang || "es";
  const langWord = l => l === "es"
    ? (t === STR.es ? "Español" : "Spanish")
    : (t === STR.es ? "Inglés" : "English");
  const onListen = () => {
    const u = speak(data.translation, tgt);
    if (!u) return;
    setPlaying(true);
    u.onend = () => setPlaying(false);
    setTimeout(() => setPlaying(false), 4000);
  };
  return (
    <div className="result">
      <div className="card">
        <div className="card-head">
          <div className="src-echo">
            {t.source}: <b>{data.input}</b> &nbsp;&middot;&nbsp;
            {langWord(src)} <Icon name="swap" size={13} /> {langWord(tgt)}
          </div>
          {data.register
            ? <span className="pill">{data.register}</span>
            : <span className="pill free">{t.free}</span>}
        </div>
        <div className="card-body">
          <div className="trans-row">
            <div style={{ flex:1 }}>
              <div className="trans">{data.translation}</div>
              {data.partOfSpeech ? <div className="pos">{data.partOfSpeech}</div> : null}
              {data.pronunciation ? <div className="phon">/{data.pronunciation}/</div> : null}
              <button className={"speak" + (playing ? " playing" : "")} onClick={onListen}>
                {playing ? <span className="eqbars"><span/><span/><span/></span>
                         : <Icon name="speaker" size={16} />}
                {playing ? t.listening : t.listen}
                <span className="pill free" style={{ marginLeft:4 }}>{t.free}</span>
              </button>
            </div>
          </div>
          {Array.isArray(data.examples) && data.examples.length ? <>
            <div className="sec-label">{t.examples}</div>
            {data.examples.slice(0,2).map((ex,i) =>
              <div className="ex" key={i}>
                <div className="es">{ex.source}</div>
                <div className="en">{ex.target}</div>
              </div>
            )}
          </> : null}
        </div>
        <div className="gate">
          <div className="gate-head">
            <span style={{ color:"var(--sage-deep)" }}><Icon name="spark" size={20} /></span>
            <span className="gate-title">{t.gateTitle}</span>
          </div>
          <p className="gate-sub">{t.gateSub}</p>
          <div className="locked-grid">
            <LockedCard t={t} icon="spark" title={t.idiomsTitle} onUnlock={onPro}>
              {Array.isArray(data.idioms) && data.idioms.length
                ? data.idioms.slice(0,2).map((id,i) =>
                    <div key={i} style={{ marginBottom:6 }}><b>{id.phrase}</b> — {id.meaning}</div>
                  )
                : <div>Common idioms and natural collocations for this word, with examples.</div>}
            </LockedCard>
            <LockedCard t={t} icon="chat" title={t.practiceTitle} onUnlock={onPro}>
              {t.practiceBlur}
            </LockedCard>
          </div>
          <div className="gate-actions">
            <button className="btn-save" onClick={onSave}>
              <Icon name="bookmark" size={18} /> {t.save}
            </button>
            <button className="btn-pro" onClick={onPro}>
              <Icon name="spark" size={18} /> {t.tryPro}
            </button>
            <button className="nav-link" onClick={onNew} style={{ marginLeft:"auto" }}>
              {t.newSearch}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

        <p className="foot">{t.haveAcct} <a onClick={onSubmit}>{t.loginLink}</a></p>
      </div>
    </div>
  );
}

/* ---- App ---- */
function App() {
  const [lang, setLang]         = useState("en");
  const [query, setQuery]       = useState("");
  const [dir, setDir]           = useState("auto");
  const [busy, setBusy]         = useState(false);
  const [result, setResult]     = useState(null);
  const [error, setError]       = useState("");
  const [modal, setModal]       = useState(null);
  const [toast, setToast]       = useState("");
  const [listening, setListening] = useState(false);
  const recRef = useRef(null);
  const t = STR[lang] || STR.en;

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(""), 2600); };
  const cycleDir  = () => setDir(d => d === "auto" ? "es2en" : d === "es2en" ? "en2es" : "auto");

  const runTranslate = useCallback(async text => {
    const q = (text != null ? text : query).trim();
    if (!q) return;
    setBusy(true); setError("");
    try {
      const data = await translatePhrase(q, dir);
      setResult(data);
    } catch {
      setError(t.err);
      setResult(null);
    } finally {
      setBusy(false);
    }
  }, [query, dir, t]);

  const onMic = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      showToast(lang === "es" ? "Tu navegador no admite voz" : "Voice input not supported here");
      return;
    }
    if (listening && recRef.current) { recRef.current.stop(); return; }
    const rec = new SR();
    rec.lang = dir === "en2es" ? "en-US" : dir === "es2en" ? "es-ES" : lang === "es" ? "es-ES" : "en-US";
    rec.interimResults = false;
    rec.onresult  = ev => { const txt = ev.results[0][0].transcript; setQuery(txt); runTranslate(txt); };
    rec.onend     = () => setListening(false);
    rec.onerror   = () => setListening(false);
    recRef.current = rec; setListening(true); rec.start();
  };

  const onHome = e => {
    if (e) e.preventDefault();
    setQuery(""); setResult(null); setError(""); setModal(null); setBusy(false);
    if (window.location.hash)
      history.replaceState(null, "", window.location.pathname + window.location.search);
    window.scrollTo({ top:0, behavior:"smooth" });
  };

  const onModalSubmit = () => { setModal(null); showToast(t.acctToast); };
  const hasResult = !!result || busy || !!error;

  // Sage glow at 58% intensity, animated (hardcoded — no tweaks panel in production)
  const a = (0.58 * 0.85).toFixed(3);
  const a2 = (0.58 * 0.85 * 0.5).toFixed(3);
  const glowBg = `radial-gradient(circle at center, rgba(93,124,105,${a}) 0%, rgba(93,124,105,${a2}) 32%, rgba(0,0,0,0) 66%)`;

  return (
    <div className="page">
      <div className="glow animate"
        style={{ background: glowBg, top: hasResult ? "30%" : "42%" }} />

      <Nav t={t} lang={lang} setLang={setLang}
        onLogin={() => setModal("login")} onHome={onHome} />

      <main className={"hero" + (hasResult ? " compact" : "")}>
        <div className="shell">
          <div className={"hero-fold" + (hasResult ? " hidden" : "")}>
            <p className="eyebrow">{t.eyebrow}</p>
            <h1 className="headline">{t.h1pre}<em>{t.h1b}</em>{t.h1c}<br />{t.h1a}</h1>
            <p className="subhead">{t.sub}</p>
          </div>

          <SearchBar t={t} value={query} setValue={v => setQuery(v)}
            onGo={() => runTranslate()} busy={busy} dir={dir} cycleDir={cycleDir}
            listening={listening} onMic={onMic} />

          {!hasResult ? (
            <div className="quickrow">
              <span className="hint" style={{ marginRight:4 }}>{t.quickLabel}</span>
              {t.quick.map(w =>
                <button key={w} className="qchip"
                  onClick={() => { setQuery(w); runTranslate(w); }}>{w}</button>
              )}
            </div>
          ) : null}

          {busy && !result ? (
            <div className="loading">
              <span className="spinner" />
              {lang === "es" ? "Traduciendo…" : "Translating…"}
            </div>
          ) : null}

          {error ? <div className="errbox">{error}</div> : null}

          {result ? (
            <Result t={t} data={result}
              onSave={() => setModal("save")}
              onPro={() => setModal("pro")}
              onNew={() => { setResult(null); setError(""); setQuery(""); }} />
          ) : null}
        </div>
      </main>

      <StorySections t={t} onContact={() => showToast(t.contactToast)} />

      {modal
        ? <Modal t={t} mode={modal} onClose={() => setModal(null)} onSubmit={onModalSubmit} />
        : null}
      {toast
        ? <div className="toast"><Icon name="check" size={18} /> {toast}</div>
        : null}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

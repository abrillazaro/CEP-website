<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Instructor Dashboard · CEP</title>
<link rel="icon" href="logo-navy.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin integrity="sha384-IAv2KMWFhznyFCUd0BKJO/PB2eEYfE3FGN3fDVEuwJFOhLhITl9e+5/Jf3DLKF0"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin integrity="sha384-nIdRDuv2JQh3qpGdO7JrPvOeFGRhsC/ERrRH64GfvFUAbKO5H5lADopPDIkqHg4J"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin integrity="sha384-wMVNZ7UEI4V5RDZGJDe+5CmyAezVV5k/1KqkpOVxeZ3bU0r2GKKFqJHZGcXPJ0"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:#152840; --navy-soft:#1e3a56; --navy-deep:#0d1e30;
    --sage:#5d7c69; --sage-deep:#4a6354;
    --surface:#f7f6f3; --surface-soft:#f0ede8;
    --line:#e4e1db; --line-strong:#ccc8c0;
    --muted:#6b7280;
    --sans:'Inter',system-ui,sans-serif;
    --serif:'DM Serif Display',Georgia,serif;
    --shadow-sm:0 1px 4px rgba(21,40,64,.07);
    --shadow-md:0 4px 18px rgba(21,40,64,.10);
    --shadow-lg:0 8px 32px rgba(21,40,64,.14);
  }
  body { font-family:var(--sans); background:var(--surface); color:var(--navy); min-height:100vh; }

  /* Nav */
  .nav{display:flex;align-items:center;justify-content:space-between;
    padding:0 32px;height:62px;border-bottom:1px solid var(--line);
    background:#fff;position:sticky;top:0;z-index:50;}
  .nav-logo img{height:36px;display:block;}
  .nav-right{display:flex;align-items:center;gap:14px;}
  .nav-badge{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    background:var(--navy);color:#fff;padding:4px 10px;border-radius:6px;}
  .btn-logout{border:1px solid var(--line-strong);background:#fff;border-radius:10px;
    padding:8px 18px;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;
    font-family:var(--sans);transition:border-color .15s,color .15s;}
  .btn-logout:hover{border-color:var(--navy);color:var(--navy);}

  /* Login gate */
  .gate{display:flex;align-items:center;justify-content:center;min-height:100vh;
    background:var(--surface);}
  .gate-card{background:#fff;border-radius:22px;padding:48px 44px;width:100%;max-width:400px;
    box-shadow:var(--shadow-lg);}
  .gate-card img{height:44px;margin-bottom:20px;}
  .gate-card h2{font-family:var(--serif);font-size:26px;color:var(--navy);margin-bottom:24px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:6px;}
  .field input{width:100%;border:1px solid var(--line-strong);border-radius:11px;
    padding:12px 14px;font-size:14.5px;font-family:var(--sans);color:var(--navy);
    background:#fff;outline:none;transition:border-color .15s;}
  .field input:focus{border-color:var(--navy);}
  .btn-primary{width:100%;background:var(--navy);color:#fff;border:none;border-radius:12px;
    padding:14px;font-size:15px;font-weight:600;font-family:var(--sans);cursor:pointer;
    transition:background .15s,transform .1s;margin-top:4px;}
  .btn-primary:hover{background:var(--navy-deep);transform:translateY(-1px);}
  .gate-err{color:#c0392b;font-size:13px;margin-bottom:14px;}

  /* Dashboard */
  .dash{max-width:960px;margin:0 auto;padding:40px 24px 80px;}
  .dash-head{display:flex;align-items:flex-end;justify-content:space-between;
    margin-bottom:28px;flex-wrap:wrap;gap:12px;}
  .dash-title{font-family:var(--serif);font-size:32px;color:var(--navy);}
  .dash-sub{font-size:14px;color:var(--muted);margin-top:4px;}
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;}
  .filter-btn{border:1px solid var(--line-strong);background:#fff;border-radius:10px;
    padding:7px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;
    font-family:var(--sans);text-transform:capitalize;transition:all .15s;}
  .filter-btn.active{border-color:var(--navy);background:var(--navy);color:#fff;}

  /* Stats */
  .stats{display:flex;gap:14px;margin-bottom:28px;flex-wrap:wrap;}
  .stat-card{background:#fff;border:1px solid var(--line);border-radius:14px;
    padding:18px 22px;flex:1;min-width:130px;}
  .stat-num{font-family:var(--serif);font-size:36px;color:var(--navy);line-height:1;}
  .stat-label{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:var(--muted);margin-top:4px;}

  /* Cards */
  .sub-list{display:flex;flex-direction:column;gap:10px;}
  .sub-card{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;
    transition:box-shadow .15s;}
  .sub-card:hover{box-shadow:var(--shadow-md);}
  .sub-card.reviewed{border-left:3px solid var(--sage);}
  .sub-header{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;
    user-select:none;}
  .sub-avatar{width:40px;height:40px;border-radius:50%;background:var(--surface-soft);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;
    color:var(--navy);flex-shrink:0;}
  .sub-info{flex:1;min-width:0;}
  .sub-name{font-weight:600;font-size:14.5px;color:var(--navy);}
  .sub-email{font-size:13px;color:var(--muted);margin-top:1px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sub-meta{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .reviewed-badge{font-size:11px;font-weight:700;color:var(--sage);
    background:rgba(93,124,105,.1);border-radius:6px;padding:3px 8px;}
  .sub-level{font-size:12px;font-weight:600;background:var(--surface-soft);
    border-radius:8px;padding:4px 10px;color:var(--navy-soft);white-space:nowrap;}
  .sub-date{font-size:12px;color:var(--muted);white-space:nowrap;}
  .chevron{color:var(--muted);transition:transform .2s;flex-shrink:0;}
  .chevron.open{transform:rotate(180deg);}

  /* Expanded answers */
  .sub-body{border-top:1px solid var(--line);padding:20px 20px 16px;}
  .qa-row{margin-bottom:14px;}
  .qa-q{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
    color:var(--muted);margin-bottom:4px;}
  .qa-a{font-size:14.5px;color:var(--navy);line-height:1.5;}
  .qa-a.empty{color:var(--muted);font-style:italic;}
  .sub-actions{display:flex;align-items:center;gap:10px;margin-top:18px;padding-top:14px;
    border-top:1px solid var(--line);flex-wrap:wrap;}
  .btn-reply{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line-strong);
    background:#fff;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:600;
    color:var(--navy);cursor:pointer;font-family:var(--sans);text-decoration:none;
    transition:border-color .15s;}
  .btn-reply:hover{border-color:var(--navy);}
  .btn-review{border:1px solid var(--sage);background:transparent;border-radius:10px;
    padding:8px 16px;font-size:13px;font-weight:600;color:var(--sage);cursor:pointer;
    font-family:var(--sans);transition:background .15s,color .15s;}
  .btn-review:hover,.btn-review.active{background:var(--sage);color:#fff;}
  .btn-del{border:none;background:transparent;padding:8px 12px;font-size:13px;
    color:var(--muted);cursor:pointer;font-family:var(--sans);border-radius:10px;
    transition:background .15s,color .15s;margin-left:auto;}
  .btn-del:hover{background:#fde8e8;color:#c0392b;}

  /* Empty state */
  .empty{text-align:center;padding:64px 24px;color:var(--muted);}
  .empty-icon{font-size:40px;margin-bottom:12px;}
  .empty p{font-size:15px;line-height:1.6;}

  @media(max-width:600px){
    .nav{padding:0 16px;}
    .dash{padding:24px 14px 60px;}
    .sub-meta{display:none;}
    .gate-card{padding:36px 24px;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

const INSTRUCTOR_EMAIL = "abrillazarodmc@gmail.com";
const INSTRUCTOR_PASS  = "CEP-instructor-2026";
const SESSION_KEY      = "cep-instructor-session";
const PLACEMENTS_KEY   = "cep-placements";
const REVIEWED_KEY     = "cep-reviewed";
const SESSION_TTL      = 24 * 60 * 60 * 1000;

function checkSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return false;
    const { em, ts } = JSON.parse(raw);
    return em === INSTRUCTOR_EMAIL && (Date.now() - ts) < SESSION_TTL;
  } catch { return false; }
}

function loadSubs() {
  try { return JSON.parse(localStorage.getItem(PLACEMENTS_KEY) || "[]"); } catch { return []; }
}

function loadReviewed() {
  try { return new Set(JSON.parse(localStorage.getItem(REVIEWED_KEY) || "[]")); } catch { return new Set(); }
}

function saveReviewed(set) {
  try { localStorage.setItem(REVIEWED_KEY, JSON.stringify([...set])); } catch {}
}

function initials(name) {
  return (name || "?").split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
}

function fmtDate(iso) {
  if (!iso) return "";
  try { return new Date(iso).toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" }); }
  catch { return iso; }
}

/* ---- Login gate ---- */
function LoginGate({ onLogin }) {
  const [email, setEmail] = useState("");
  const [pass, setPass]   = useState("");
  const [err, setErr]     = useState("");

  const submit = e => {
    e.preventDefault();
    if (email === INSTRUCTOR_EMAIL && pass === INSTRUCTOR_PASS) {
      localStorage.setItem(SESSION_KEY, JSON.stringify({ em: email, ts: Date.now() }));
      onLogin();
    } else {
      setErr("Incorrect credentials. Please try again.");
    }
  };

  return (
    <div className="gate">
      <div className="gate-card">
        <img src="logo-navy.png" alt="CEP" />
        <h2>Instructor Login</h2>
        {err && <p className="gate-err">{err}</p>}
        <form onSubmit={submit}>
          <div className="field">
            <label>Email</label>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="name@email.com" required autoFocus />
          </div>
          <div className="field">
            <label>Password</label>
            <input type="password" value={pass} onChange={e => setPass(e.target.value)} placeholder="••••••••" required />
          </div>
          <button className="btn-primary" type="submit">Log in</button>
        </form>
      </div>
    </div>
  );
}

/* ---- Single submission card ---- */
function SubCard({ sub, globalIndex, reviewed, onToggle, onDelete }) {
  const [open, setOpen] = useState(false);
  const id = sub.submittedAt || String(globalIndex);
  const done = reviewed.has(id);

  const qaEntries = Object.entries(sub).filter(([k]) =>
    !["name","email","submittedAt","_subject"].includes(k)
  );

  const firstName = (sub.name || "").split(" ")[0] || "";
  const mailto = `mailto:${sub.email}?subject=Re%3A%20CEP%20Placement%20Test&body=Hi%20${encodeURIComponent(firstName)}%2C%0A%0A`;

  return (
    <div className={"sub-card" + (done ? " reviewed" : "")}>
      <div className="sub-header" onClick={() => setOpen(o => !o)}>
        <div className="sub-avatar">{initials(sub.name)}</div>
        <div className="sub-info">
          <div className="sub-name">{sub.name || "—"}</div>
          <div className="sub-email">{sub.email || "—"}</div>
        </div>
        <div className="sub-meta">
          {done && <span className="reviewed-badge">Reviewed ✓</span>}
          {sub["Self-assessed level"] && <span className="sub-level">{sub["Self-assessed level"]}</span>}
          <span className="sub-date">{fmtDate(sub.submittedAt)}</span>
        </div>
        <svg className={"chevron" + (open ? " open" : "")} width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>

      {open && (
        <div className="sub-body">
          {qaEntries.map(([q, a], i) => (
            <div key={i} className="qa-row">
              <div className="qa-q">{q}</div>
              <div className={"qa-a" + (!a ? " empty" : "")}>{a || "No answer provided"}</div>
            </div>
          ))}
          <div className="sub-actions">
            <a className="btn-reply" href={mailto}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/>
              </svg>
              Reply
            </a>
            <button className={"btn-review" + (done ? " active" : "")} onClick={() => onToggle(id)}>
              {done ? "Reviewed ✓" : "Mark reviewed"}
            </button>
            <button className="btn-del" onClick={() => onDelete(globalIndex)}>Delete</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ---- Dashboard ---- */
function Dashboard({ onLogout }) {
  const [subs, setSubs]         = useState(loadSubs);
  const [reviewed, setReviewed] = useState(loadReviewed);
  const [filter, setFilter]     = useState("all");

  const toggle = useCallback(id => {
    setReviewed(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      saveReviewed(next);
      return next;
    });
  }, []);

  const deleteSub = useCallback(index => {
    if (!confirm("Delete this submission? This cannot be undone.")) return;
    setSubs(prev => {
      const next = [...prev];
      next.splice(index, 1);
      try { localStorage.setItem(PLACEMENTS_KEY, JSON.stringify(next)); } catch {}
      return next;
    });
  }, []);

  const logout = () => {
    try { localStorage.removeItem(SESSION_KEY); } catch {}
    onLogout();
  };

  const newestFirst = [...subs].map((s, i) => ({ s, i })).reverse();
  const unreviewed = newestFirst.filter(({ s }) => !reviewed.has(s.submittedAt || "")).length;

  const displayed = filter === "unreviewed"
    ? newestFirst.filter(({ s }) => !reviewed.has(s.submittedAt || ""))
    : filter === "reviewed"
    ? newestFirst.filter(({ s }) => reviewed.has(s.submittedAt || ""))
    : newestFirst;

  return (
    <>
      <nav className="nav">
        <a className="nav-logo" href="index.html">
          <img src="logo-navy.png" alt="The Corporate English Project" />
        </a>
        <div className="nav-right">
          <span className="nav-badge">Instructor</span>
          <button className="btn-logout" onClick={logout}>Log out</button>
        </div>
      </nav>

      <div className="dash">
        <div className="dash-head">
          <div>
            <h1 className="dash-title">Placement Tests</h1>
            <p className="dash-sub">Review student submissions and reach out</p>
          </div>
          <div className="filter-row">
            {["all","unreviewed","reviewed"].map(f => (
              <button key={f} className={"filter-btn" + (filter === f ? " active" : "")} onClick={() => setFilter(f)}>
                {f}
              </button>
            ))}
          </div>
        </div>

        <div className="stats">
          <div className="stat-card">
            <div className="stat-num">{subs.length}</div>
            <div className="stat-label">Total</div>
          </div>
          <div className="stat-card">
            <div className="stat-num" style={{ color: unreviewed > 0 ? "var(--navy)" : "var(--sage)" }}>
              {unreviewed}
            </div>
            <div className="stat-label">Needs review</div>
          </div>
          <div className="stat-card">
            <div className="stat-num" style={{ color:"var(--sage)" }}>{subs.length - unreviewed}</div>
            <div className="stat-label">Reviewed</div>
          </div>
        </div>

        {displayed.length === 0 ? (
          <div className="empty">
            <div className="empty-icon">📋</div>
            <p>{subs.length === 0
              ? "No submissions yet. They'll appear here once students complete the placement test."
              : "No submissions match this filter."}</p>
          </div>
        ) : (
          <div className="sub-list">
            {displayed.map(({ s, i }) => (
              <SubCard
                key={s.submittedAt || i}
                sub={s}
                globalIndex={i}
                reviewed={reviewed}
                onToggle={toggle}
                onDelete={deleteSub}
              />
            ))}
          </div>
        )}
      </div>
    </>
  );
}

/* ---- Root ---- */
function App() {
  const [authed, setAuthed] = useState(checkSession);
  return authed
    ? <Dashboard onLogout={() => setAuthed(false)} />
    : <LoginGate onLogin={() => setAuthed(true)} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

<script>
// Auth gate — check Supabase session directly from localStorage (no SDK needed)
(function() {
  try {
    var key = 'sb-qkxhzpicqjxodeadhcvw-auth-token';
    var raw = localStorage.getItem(key);
    if (!raw) { window.location.replace('login.html'); return; }
    var session = JSON.parse(raw);
    if (!session || !session.access_token) { window.location.replace('login.html'); return; }
    // Check token expiry
    if (session.expires_at && Math.floor(Date.now() / 1000) > session.expires_at) {
      localStorage.removeItem(key);
      window.location.replace('login.html');
      return;
    }
  } catch(e) {
    window.location.replace('login.html');
  }
  // Logout: clear session and go back to login
  window.__cepLogout = function() {
    try { localStorage.removeItem('sb-qkxhzpicqjxodeadhcvw-auth-token'); } catch(e) {}
    window.location.href = 'index.html';
  };
})();
</script>
<script>
// Wire window.claude.complete to the Netlify translation function
window.claude = {
  complete: async function(prompt) {
    const res = await fetch("/api/translate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt })
    });
    if (!res.ok) throw new Error("Translation service error");
    return res.text();
  }
};
</script>

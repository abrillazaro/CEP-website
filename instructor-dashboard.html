<script>
// Auth gate — instructors only. Checks both the Supabase session AND
// the legacy hardcoded instructor session from the landing page modal.
(function() {
  var redirectTo = 'index.html';
  try {
    // Check hardcoded instructor session (used by the landing page login modal)
    var legacyRaw = localStorage.getItem('cep-instructor-session');
    if (legacyRaw) {
      var legacy = JSON.parse(legacyRaw);
      var TTL = 24 * 60 * 60 * 1000;
      if (legacy && legacy.ts && (Date.now() - legacy.ts) < TTL) return; // ✅ authorised
    }
    // Check Supabase session with instructor role flag
    var sbRaw = localStorage.getItem('sb-qkxhzpicqjxodeadhcvw-auth-token');
    if (sbRaw) {
      var sb = JSON.parse(sbRaw);
      if (sb && sb.access_token) {
        var meta = (sb.user && sb.user.user_metadata) || {};
        if (meta.role === 'instructor') return; // ✅ authorised
      }
    }
  } catch(e) {}
  // Not authorised — send home
  window.location.replace(redirectTo);
})();
</script>
<script>
window.claude = {
  complete: async function(prompt) {
    const res = await fetch("/api/translate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt })
    });
    if (!res.ok) throw new Error("Translation service error");
    return res.text();
  }
};
</script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --navy:#0f1e2e;
      --navy-mid:#1a2f44;
      --navy-light:#243d55;
      --gold:#c9a84c;
      --gold-light:#e2c47a;
      --blue:#4a6b8a;
      --text-dim:#8ba3bc;
      --serif:'Playfair Display',Georgia,serif;
      --sans:'DM Sans',system-ui,sans-serif;
    }
    html,body{height:100%;font-family:var(--sans);background:var(--navy);color:#e8f0f8;}
    body::before{
      content:'';position:fixed;inset:0;
      background:
        radial-gradient(ellipse at 15% 50%,rgba(74,107,138,.18) 0%,transparent 60%),
        radial-gradient(ellipse at 85% 20%,rgba(201,168,76,.08) 0%,transparent 50%),
        radial-gradient(ellipse at 50% 90%,rgba(74,107,138,.12) 0%,transparent 55%);
      pointer-events:none;
    }
    .page{
      min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      padding:32px 20px;position:relative;
    }
    .back-link{
      position:absolute;top:28px;left:28px;
      color:var(--text-dim);font-size:13px;font-weight:500;
      text-decoration:none;display:flex;align-items:center;gap:6px;
      transition:color .15s;
    }
    .back-link:hover{color:#e8f0f8;}
    .login-card{
      width:100%;max-width:420px;
      background:rgba(26,47,68,.7);
      border:.5px solid rgba(201,168,76,.2);
      border-radius:20px;
      padding:44px 40px 40px;
      box-shadow:0 24px 64px rgba(0,0,0,.45),
                 inset 0 1px 0 rgba(201,168,76,.12);
    }
    .card-logo{display:flex;justify-content:center;margin-bottom:28px;}
    .card-logo img{height:52px;filter:brightness(0) invert(1) opacity(.85);}
    .card-eyebrow{
      text-align:center;font-size:11px;font-weight:500;
      letter-spacing:.12em;text-transform:uppercase;
      color:var(--gold);margin-bottom:8px;
    }
    .card-title{
      font-family:var(--serif);font-size:28px;font-weight:600;
      color:#e8f0f8;text-align:center;margin-bottom:6px;line-height:1.2;
    }
    .card-sub{font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:32px;}
    .gold-rule{border:none;border-top:.5px solid rgba(201,168,76,.25);margin-bottom:28px;}
    .field-label{
      display:block;font-size:11.5px;font-weight:500;
      letter-spacing:.06em;color:var(--text-dim);
      text-transform:uppercase;margin-bottom:7px;
    }
    .field-wrap{margin-bottom:18px;}
    .field-input{
      width:100%;
      background:rgba(15,30,46,.6);
      border:.5px solid rgba(201,168,76,.25);
      border-radius:10px;
      color:#e8f0f8;font-family:var(--sans);font-size:14px;
      padding:12px 16px;outline:none;
      transition:border-color .2s,background .2s;
    }
    .field-input::placeholder{color:rgba(139,163,188,.5);}
    .field-input:focus{
      border-color:rgba(201,168,76,.55);
      background:rgba(15,30,46,.85);
    }
    /* Invite code field — slightly distinct */
    .field-input.code-field{
      letter-spacing:.12em;font-weight:500;
      border-color:rgba(201,168,76,.35);
    }
    .field-input.code-field:focus{border-color:rgba(201,168,76,.7);}
    .code-hint{
      font-size:11.5px;color:var(--text-dim);margin-top:6px;
      font-style:italic;
    }
    .error-box{
      display:none;
      background:rgba(192,57,43,.15);
      border:.5px solid rgba(192,57,43,.4);
      border-radius:8px;padding:11px 14px;margin-bottom:20px;
      font-size:13px;color:#f1948a;text-align:center;
    }
    .error-box.show{display:block;}
    .success-box{
      display:none;
      background:rgba(39,174,96,.12);
      border:.5px solid rgba(39,174,96,.35);
      border-radius:8px;padding:16px 14px;margin-bottom:20px;
      font-size:13.5px;color:#82e0aa;text-align:center;
      line-height:1.5;
    }
    .success-box.show{display:block;}
    .submit-btn{
      width:100%;
      background:linear-gradient(135deg,var(--gold) 0%,var(--gold-light) 100%);
      color:var(--navy);border:none;border-radius:10px;
      padding:13px 24px;font-family:var(--sans);font-size:14px;font-weight:600;
      cursor:pointer;letter-spacing:.03em;
      transition:opacity .2s,transform .15s;margin-top:6px;
    }
    .submit-btn:hover:not(:disabled){opacity:.9;transform:translateY(-1px);}
    .submit-btn:disabled{opacity:.55;cursor:default;transform:none;}
    .card-footer{
      margin-top:24px;text-align:center;
      font-size:12px;color:var(--text-dim);
    }
    .card-footer a{color:var(--gold);text-decoration:none;}
    .card-footer a:hover{text-decoration:underline;}
    @media(max-width:480px){
      .login-card{padding:32px 24px 28px;}
      .back-link{top:16px;left:16px;}
    }
  </style>
</head>

    <p class="card-eyebrow">Instructor Access</p>
    <h1 class="card-title">Create your account</h1>
    <p class="card-sub">You need an invite code to register as an instructor</p>

    <hr class="gold-rule"/>

    <div class="error-box"   id="errorBox"></div>
    <div class="success-box" id="successBox"></div>

    <div class="field-wrap">
      <label class="field-label" for="name">Full name</label>
      <input id="name" class="field-input" type="text" placeholder="Jane Smith" autocomplete="name"/>
    </div>

    <div class="field-wrap">
      <label class="field-label" for="email">Email address</label>
      <input id="email" class="field-input" type="email" placeholder="you@example.com" autocomplete="email"/>
    </div>

    <div class="field-wrap">
      <label class="field-label" for="password">Password</label>
      <input id="password" class="field-input" type="password" placeholder="Min. 8 characters" autocomplete="new-password"/>
    </div>

    <div class="field-wrap">
      <label class="field-label" for="code">Invite code</label>
      <input id="code" class="field-input code-field" type="text" placeholder="Enter your invite code"
             autocomplete="off" onkeydown="if(event.key==='Enter')doSignup()"/>
      <p class="code-hint">You should have received this code from CEP.</p>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="doSignup()">Create instructor account</button>

    <div class="card-footer">
      Already have an account? <a href="instructor-login.html">Sign in here</a>
    </div>

  </div>
</div>

<script>
// ── Change this code whenever you want to rotate it ───────────────────────────
const INVITE_CODE = 'CEP-TEACH-2025';
// ─────────────────────────────────────────────────────────────────────────────

const _sb = window.supabase.createClient(
  'https://qkxhzpicqjxodeadhcvw.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFreGh6cGljcWp4b2RlYWRoY3Z3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNTg2NTUsImV4cCI6MjA5MjgzNDY1NX0.wLL0h9vQ8W5xp7mKFbq-CphiqE4cRVGTQ-KayuteHt8'
);

function showError(msg) {
  var eb = document.getElementById('errorBox');
  eb.textContent = msg;
  eb.classList.add('show');
  document.getElementById('successBox').classList.remove('show');
}
function showSuccess(msg) {
  var sb = document.getElementById('successBox');
  sb.innerHTML = msg;
  sb.classList.add('show');
  document.getElementById('errorBox').classList.remove('show');
}
function clearMessages() {
  document.getElementById('errorBox').classList.remove('show');
  document.getElementById('successBox').classList.remove('show');
}

async function doSignup() {
  clearMessages();

  var name     = document.getElementById('name').value.trim();
  var email    = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var code     = document.getElementById('code').value.trim();
  var btn      = document.getElementById('submitBtn');

  // Client-side validation
  if (!name)                        { showError('Please enter your full name.'); return; }
  if (!email)                       { showError('Please enter your email address.'); return; }
  if (password.length < 8)          { showError('Password must be at least 8 characters.'); return; }
  if (code !== INVITE_CODE)         { showError('Invalid invite code. Please check the code you received and try again.'); return; }

  btn.disabled = true;
  btn.textContent = 'Creating account…';

  // Sign up — pass role + full_name in metadata so the DB trigger picks them up
  var { data, error } = await _sb.auth.signUp({
    email,
    password,
    options: {
      data: {
        full_name: name,
        role: 'teacher'
      }
    }
  });

  if (error) {
    showError(error.message || 'Something went wrong. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Create instructor account';
    return;
  }

  // Supabase may return a user but require email confirmation depending on your project settings.
  // Either way, we show a success message.
  showSuccess(
    '&#10003; Account created! Check your email to confirm your address, then ' +
    '<a href="instructor-login.html">sign in here</a>.'
  );

  // Clear the form
  ['name','email','password','code'].forEach(function(id) {
    document.getElementById(id).value = '';
  });
  btn.textContent = 'Account created';
  // Keep button disabled so they don't submit twice
}
</script>
